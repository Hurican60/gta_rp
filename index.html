<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>École des Arts Arcanes — GTA RP</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --gold: #c9a84c; --gold-light: #e8c97a; --gold-dark: #8a6a1f;
  --parchment: #f0e6cc; --muted: #7a6a4f; --deep: #0a0804;
  --accent-ferrox: #7a1f1f; --accent-ferrox-light: #c43030;
  --accent-acad: #1f3d7a; --accent-acad-light: #4a7bc4;
}
body { background:#0a0804; font-family:'IM Fell English',serif; color:var(--parchment); min-height:100vh; overflow-x:hidden; }
.bg-ambiance { position:fixed; inset:0; pointer-events:none; z-index:0;
  background: radial-gradient(ellipse at 15% 40%,rgba(122,31,31,.07) 0%,transparent 55%),
              radial-gradient(ellipse at 85% 40%,rgba(31,61,122,.07) 0%,transparent 55%),
              radial-gradient(ellipse at 50% 100%,rgba(201,168,76,.05) 0%,transparent 50%); }
.site-wrapper { position:relative; z-index:1; display:flex; flex-direction:column; min-height:100vh; }

/* SETUP */
#setup-overlay { position:fixed; inset:0; z-index:9999; background:rgba(5,4,2,.97); display:flex; align-items:center; justify-content:center; }
#setup-overlay.hidden { display:none; }
.setup-box { background:rgba(15,12,6,.9); border:1px solid rgba(201,168,76,.3); border-radius:6px; padding:2.5rem; max-width:520px; width:90%; text-align:center; }
.setup-input { width:100%; background:rgba(8,6,2,.8); border:1px solid rgba(201,168,76,.2); border-radius:3px; color:var(--parchment); padding:.6rem .9rem; margin-bottom:1rem; outline:none; }
.setup-btn { width:100%; background:linear-gradient(135deg,rgba(201,168,76,.15),rgba(201,168,76,.05)); border:1px solid rgba(201,168,76,.4); color:var(--gold-light); font-family:'Cinzel Decorative'; padding:.75rem; cursor:pointer; text-transform:uppercase; border-radius:3px; }

/* HEADER */
header { text-align:center; padding:2.2rem 2rem 1.5rem; border-bottom:1px solid rgba(201,168,76,.2); }
.header-ornament { font-size:22px; color:var(--gold); letter-spacing:18px; margin-bottom:.4rem; display:block; opacity:.6; }
.school-name { font-family:'Cinzel Decorative',cursive; font-size:clamp(1.3rem,3.5vw,2.5rem); color:var(--gold-light); text-shadow:0 0 40px rgba(201,168,76,.35); }

/* RUBRIQUE BAR */
.rubrique-bar { display:flex; align-items:center; background:rgba(5,4,2,.8); border-bottom:1px solid rgba(201,168,76,.15); padding:0 2rem; overflow-x:auto; }
.rubrique-tab { padding:.9rem 1.8rem; font-family:'Cinzel Decorative'; font-size:.62rem; color:var(--muted); cursor:pointer; border-bottom:2px solid transparent; transition:all .2s; white-space:nowrap; text-transform:uppercase; }
.rubrique-tab.active-matieres { color:var(--gold-light); border-bottom-color:var(--gold); }
.rubrique-tab.active-ferrox { color:#e87070; border-bottom-color:var(--accent-ferrox-light); }
.rubrique-tab.active-academie { color:#70a0e8; border-bottom-color:var(--accent-acad-light); }

/* LAYOUT & NAV */
.rubrique-panel { display:none; flex:1; }
.rubrique-panel.active { display:flex; }
.main-layout { display:flex; flex:1; max-width:1300px; margin:0 auto; width:100%; }
nav { width:250px; min-width:190px; padding:1.5rem 0; border-right:1px solid rgba(201,168,76,.12); position:sticky; top:0; height:calc(100vh - 158px); overflow-y:auto; }
.nav-title { font-family:'Cinzel Decorative'; font-size:.55rem; color:var(--muted); letter-spacing:.22em; padding:0 1.2rem .8rem; border-bottom:1px solid rgba(201,168,76,0.1); margin-bottom:.4rem; }
.nav-item { display:flex; align-items:center; gap:.7rem; padding:.65rem 1.2rem; cursor:pointer; font-size:.88rem; color:var(--muted); border-left:3px solid transparent; transition:0.2s; }
.nav-item.active { color:var(--gold-light); background:rgba(201,168,76,0.08); border-left-color:var(--gold); }
.nav-item.active-ferrox-item { color:#e87070 !important; background:rgba(122,31,31,0.1); border-left-color:var(--accent-ferrox-light); }
.nav-item.active-acad-item { color:#70a0e8 !important; background:rgba(31,61,122,0.1); border-left-color:var(--accent-acad-light); }

/* EDITOR & PREVIEW */
.content-area { flex:1; padding:2rem 2.5rem; }
.course-panel { display:none; }
.course-panel.active { display:block; }
.editor-toolbar { display:flex; gap:3px; background:rgba(201,168,76,0.05); border:1px solid rgba(201,168,76,0.2); padding:5px; border-radius:4px 4px 0 0; }
.course-editor { width:100%; min-height:250px; background:rgba(10,8,4,0.8); border:1px solid rgba(201,168,76,0.2); border-top:none; padding:1rem; color:var(--parchment); font-family:inherit; font-size:1rem; outline:none; resize:vertical; }

.preview-title { margin-top: 3rem; font-family: 'Cinzel Decorative'; font-size: 0.7rem; color: var(--gold); letter-spacing: 0.1em; border-bottom: 1px solid rgba(201,168,76,0.2); padding-bottom: 0.5rem; margin-bottom: 1rem; }
.course-preview { background: rgba(240, 230, 204, 0.03); border: 1px solid rgba(201, 168, 76, 0.1); padding: 2rem; border-radius: 4px; line-height: 1.8; color: #e0d5ba; min-height: 100px; white-space: pre-wrap; margin-bottom: 3rem; }
.preview-h1 { color: var(--gold-light); font-family: 'Cinzel Decorative'; font-size: 1.5rem; display: block; margin-top: 1rem; border-bottom: 1px solid rgba(201,168,76,0.2); }

/* IMAGES GRID */
.image-upload-zone { border:1.5px dashed rgba(201,168,76,.25); padding:2rem; text-align:center; cursor:pointer; margin-bottom:1rem; color:var(--gold-light); background: rgba(201,168,76,0.02); }
.image-upload-zone:hover { background: rgba(201,168,76,0.05); border-color: var(--gold); }
.image-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:15px; margin-top:1rem; }
.image-card { position:relative; border-radius:4px; overflow:hidden; border:1px solid rgba(201,168,76,.15); background:rgba(8,6,2,.5); aspect-ratio:4/3; }
.image-card img { width:100%; height:100%; object-fit:cover; transition:0.3s; }
.image-card-overlay { position:absolute; inset:0; background:rgba(0,0,0,.6); display:flex; align-items:center; justify-content:center; opacity:0; transition:.2s; }
.image-card:hover .image-card-overlay { opacity:1; }
.del-btn { background:rgba(122,31,31,0.8); border:1px solid #c43030; color:white; padding:4px 8px; font-size:10px; cursor:pointer; border-radius:2px; }

/* SAVE */
.save-row { margin-top:1rem; display:flex; justify-content: flex-end; }
.save-btn { background: linear-gradient(to bottom, #c9a84c, #8a6a1f); color: #0a0804; border: none; padding: 0.8rem 2rem; font-family: 'Cinzel Decorative'; font-weight: bold; cursor: pointer; border-radius: 2px; text-transform: uppercase; letter-spacing: 1px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
.save-btn:hover { background: #e8c97a; transform: translateY(-1px); }

#sync-dot { position:fixed; top:1rem; right:1rem; z-index:500; width:10px; height:10px; border-radius:50%; background:var(--gold-dark); transition: 0.3s; }
#sync-dot.ok { background:#50c878; box-shadow: 0 0 10px #50c878; }
#status-bar { position:fixed; bottom:1rem; right:1rem; z-index:500; }
.toast { background:rgba(10,8,4,0.95); border:1px solid var(--gold); padding:0.6rem 1.2rem; color:var(--gold-light); border-radius:4px; font-size:0.9rem; margin-top:0.5rem; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
</style>
</head>
<body>
<div class="bg-ambiance"></div>
<div id="sync-dot"></div>

<div id="setup-overlay">
  <div class="setup-box">
    <div class="setup-title">⚙ Configuration Supabase</div>
    <input class="setup-input" id="input-url" placeholder="URL du projet">
    <input class="setup-input" id="input-key" placeholder="Clé Anon Public">
    <button class="setup-btn" onclick="connectSupabase()">✦ Ouvrir le Grimoire</button>
  </div>
</div>

<div class="site-wrapper">
  <header>
    <div class="school-name">École des Arts Arcanes</div>
    <div style="font-style:italic; color:var(--muted); font-size:0.9rem;">Registre de Pédagogie Arcanique</div>
  </header>

  <div class="rubrique-bar">
    <div class="rubrique-tab active-matieres" id="tab-matieres" onclick="switchRubrique('matieres')">📚 Matières</div>
    <div class="rubrique-tab" id="tab-ferrox" onclick="switchRubrique('ferrox')">🩸 Maison Ferrox</div>
    <div class="rubrique-tab" id="tab-academie" onclick="switchRubrique('academie')">🏛️ Académie</div>
  </div>

  <div id="rubrique-matieres" class="rubrique-panel active">
    <div class="main-layout"><nav id="nav-matieres"><div class="nav-title">GRIMOIRE</div></nav><div class="content-area" id="content-matieres"></div></div>
  </div>
  <div id="rubrique-ferrox" class="rubrique-panel">
    <div class="main-layout"><nav id="nav-ferrox"><div class="nav-title" style="color:#e87070">FERROX</div></nav><div class="content-area" id="content-ferrox"></div></div>
  </div>
  <div id="rubrique-academie" class="rubrique-panel">
    <div class="main-layout"><nav id="nav-academie"><div class="nav-title" style="color:#70a0e8">ACADÉMIE</div></nav><div class="content-area" id="content-academie"></div></div>
  </div>
</div>

<div id="status-bar"></div>

<script>
// --- DONNÉES ---
const MATIERES = [
  {id:'sortileges',icon:'⚡',label:'Sortilèges'}, {id:'potions',icon:'⚗️',label:'Potions'},
  {id:'botanique',icon:'🌿',label:'Botanique'}, {id:'discipline',icon:'📜',label:'Discipline'},
  {id:'culinaire',icon:'🍵',label:'Survie Culinaire'}, {id:'dcfo',icon:'🛡️',label:'DCFO'},
  {id:'histoire',icon:'📖',label:'Histoire'}, {id:'vol',icon:'🧹',label:'Vol'},
  {id:'creatures',icon:'🐉',label:'Créatures'}, {id:'divination',icon:'🔮',label:'Divination'}
];
const FERROX_COURSES = [
  {id:'ferrox-h',icon:'📜',label:'Histoire Ferrox'}, {id:'ferrox-r',icon:'🩸',label:'Rituels & Sang'},
  {id:'ferrox-a',icon:'⚔️',label:'Armes & Combat'}, {id:'ferrox-al',icon:'🔥',label:'Alchimie Sombre'},
  {id:'ferrox-c',icon:'🦅',label:'Codes & Lois'}, {id:'ferrox-m',icon:'🩻',label:'Hiérarchie'},
  {id:'ferrox-ca',icon:'🗺️',label:'Cartographie'}, {id:'ferrox-d',icon:'📁',label:'Divers'}
];
const ACADEMIE_COURSES = [
  {id:'acad-r',icon:'📋',label:'Règles & Statuts'}, {id:'acad-c',icon:'🎓',label:'Programmes'},
  {id:'acad-e',icon:'✏️',label:'Examens'}, {id:'acad-p',icon:'👤',label:'Professeurs'},
  {id:'acad-ev',icon:'🌟',label:'Événements'}, {id:'acad-ca',icon:'🗺️',label:'Cartographie'},
  {id:'acad-ar',icon:'🗄️',label:'Archives'}, {id:'acad-d',icon:'📁',label:'Divers'}
];

let sb = null;
const imageStore = {};

// --- SUPABASE ---
async function connectSupabase() {
  const url = document.getElementById('input-url').value.trim();
  const key = document.getElementById('input-key').value.trim();
  try {
    sb = supabase.createClient(url, key);
    const {error} = await sb.from('notes').select('id').limit(1);
    if (error) throw error;
    localStorage.setItem('sb_url', url); localStorage.setItem('sb_key', key);
    document.getElementById('setup-overlay').classList.add('hidden');
    setSyncDot('ok'); await loadAllData();
  } catch(e) { alert("Accès refusé."); }
}

async function initSupabase() {
  const url = localStorage.getItem('sb_url'), key = localStorage.getItem('sb_key');
  if (url && key) {
    sb = supabase.createClient(url, key);
    document.getElementById('setup-overlay').classList.add('hidden');
    setSyncDot('ok'); await loadAllData();
  }
}

async function loadAllData() {
  if (!sb) return;
  const {data:notes} = await sb.from('notes').select('*');
  (notes||[]).forEach(n => {
    const ta = document.getElementById('editor-'+n.id);
    if (ta) { ta.value = n.content || ''; updatePreview(n.id); }
  });
  const {data:imgs} = await sb.from('images').select('*');
  (imgs||[]).forEach(img => {
    if(!imageStore[img.course_id]) imageStore[img.course_id] = [];
    imageStore[img.course_id].push({id:img.id, src:img.src});
  });
  [...MATIERES, ...FERROX_COURSES, ...ACADEMIE_COURSES].forEach(c => renderGrid(c.id));
}

// --- SAUVEGARDE ET PREVIEW ---
async function saveCourse(id) {
  if (!sb) return;
  const ta = document.getElementById('editor-'+id);
  const {error} = await sb.from('notes').upsert({id, content: ta.value, updated_at: new Date().toISOString()});
  if (!error) {
    updatePreview(id);
    toast("Savoir gravé avec succès ✓");
  }
}

function updatePreview(id) {
  const ta = document.getElementById('editor-'+id), prev = document.getElementById('preview-'+id);
  if(!ta || !prev) return;
  prev.innerHTML = ta.value
    .replace(/^# (.*$)/gim, '<span class="preview-h1">$1</span>')
    .replace(/^• (.*$)/gim, '<div>• $1</div>') || '<p style="opacity:0.3">En attente de rédaction...</p>';
}

// --- IMAGES ---
async function addImages(id, input) {
  if (!sb) return;
  for (const file of input.files) {
    const reader = new FileReader();
    reader.onload = async (e) => {
      const b64 = e.target.result;
      const {data, error} = await sb.from('images').insert({course_id:id, src:b64}).select().single();
      if(!error) {
        if(!imageStore[id]) imageStore[id] = [];
        imageStore[id].push({id:data.id, src:b64});
        renderGrid(id);
      }
    };
    reader.readAsDataURL(file);
  }
}

function renderGrid(id) {
  const grid = document.getElementById('grid-'+id);
  if (!grid) return;
  grid.innerHTML = (imageStore[id]||[]).map((img, i) => `
    <div class="image-card">
      <img src="${img.src}">
      <div class="image-card-overlay">
        <button class="del-btn" onclick="deleteImg('${id}', ${i})">Supprimer</button>
      </div>
    </div>`).join('');
}

async function deleteImg(courseId, idx) {
  const img = imageStore[courseId][idx];
  await sb.from('images').delete().eq('id', img.id);
  imageStore[courseId].splice(idx,1); renderGrid(courseId);
}

// --- UI ---
function buildPanel(c, rub) {
  return `
  <div id="panel-${c.id}" class="course-panel">
    <h2 style="font-family:'Cinzel Decorative'; color:var(--gold-light); margin-bottom:1rem;">${c.icon} ${c.label}</h2>
    <div class="editor-toolbar">
        <button class="toolbar-btn" onclick="ins('${c.id}','# ')">Titre</button>
        <button class="toolbar-btn" onclick="ins('${c.id}','• ')">Liste</button>
    </div>
    <textarea class="course-editor" id="editor-${c.id}" placeholder="Inscrivez votre savoir..."></textarea>
    <div class="save-row"><button class="save-btn" onclick="saveCourse('${c.id}')">✦ Sauvegarder dans le Grimoire</button></div>
    
    <div class="preview-title">📜 Lecture du Grimoire (Version enregistrée)</div>
    <div class="course-preview" id="preview-${c.id}"></div>

    <div class="preview-title">🖼️ Iconographie (Images)</div>
    <div class="image-upload-zone" onclick="document.getElementById('file-${c.id}').click()">✦ Ajouter des parchemins visuels</div>
    <input type="file" id="file-${c.id}" hidden multiple onchange="addImages('${c.id}',this)">
    <div class="image-grid" id="grid-${c.id}"></div>
  </div>`;
}

function buildAll() {
  const configs = [{c:MATIERES, r:'matieres'}, {c:FERROX_COURSES, r:'ferrox'}, {c:ACADEMIE_COURSES, r:'academie'}];
  configs.forEach(conf => {
    const nav = document.getElementById('nav-'+conf.r), cont = document.getElementById('content-'+conf.r);
    conf.c.forEach((c,i) => {
      const activeCls = i===0 ? (conf.r==='ferrox'?'active-ferrox-item':conf.r==='academie'?'active-acad-item':'active') : '';
      nav.innerHTML += `<div class="nav-item ${activeCls}" onclick="showCourse('${c.id}',this,'${conf.r}')">${c.icon} ${c.label}</div>`;
      cont.innerHTML += buildPanel(c, conf.r);
    });
    if(conf.c[0]) document.getElementById('panel-'+conf.c[0].id).classList.add('active');
  });
}

function ins(id, t) {
  const ta = document.getElementById('editor-'+id);
  const s = ta.selectionStart;
  ta.value = ta.value.substring(0,s) + t + ta.value.substring(ta.selectionEnd);
  ta.focus();
}

function showCourse(id, el, rub) {
  el.parentElement.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active', 'active-ferrox-item', 'active-acad-item'));
  document.getElementById('rubrique-'+rub).querySelectorAll('.course-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + id).classList.add('active');
  const cls = rub === 'ferrox' ? 'active-ferrox-item' : (rub === 'academie' ? 'active-acad-item' : 'active');
  el.classList.add(cls);
}

function switchRubrique(n) {
  document.querySelectorAll('.rubrique-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.rubrique-tab').forEach(t => t.classList.remove('active-matieres', 'active-ferrox', 'active-academie'));
  document.getElementById('rubrique-'+n).classList.add('active');
  document.getElementById('tab-'+n).classList.add('active-'+n);
}

function setSyncDot(s) { document.getElementById('sync-dot').className = s; }
function toast(m) {
  const bar = document.getElementById('status-bar');
  const e = document.createElement('div'); e.className = 'toast'; e.textContent = m;
  bar.appendChild(e); setTimeout(()=>e.remove(), 2500);
}

buildAll();
initSupabase();
</script>
</body>
</html>
