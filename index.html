<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>École des Arts Arcanes — Grimoire RP</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* --- DESIGN --- */
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --gold: #c9a84c; --gold-light: #e8c97a; --gold-dark: #8a6a1f;
  --parchment: #f0e6cc; --muted: #7a6a4f; --deep: #0a0804;
}
body { background:#0a0804; font-family:'IM Fell English',serif; color:var(--parchment); min-height:100vh; overflow-x:hidden; }
.bg-ambiance { position:fixed; inset:0; pointer-events:none; z-index:0; background: radial-gradient(ellipse at 15% 40%,rgba(122,31,31,.07) 0%,transparent 55%), radial-gradient(ellipse at 85% 40%,rgba(31,61,122,.07) 0%,transparent 55%); }

header { text-align:center; padding:1.5rem; border-bottom:1px solid rgba(201,168,76,.2); }
.school-name { font-family:'Cinzel Decorative',cursive; font-size:1.8rem; color:var(--gold-light); }

.rubrique-bar { display:flex; background:rgba(5,4,2,.8); border-bottom:1px solid rgba(201,168,76,.15); overflow-x: auto; }
.rubrique-tab { padding:1rem 1.5rem; font-family:'Cinzel Decorative'; font-size:.6rem; color:var(--muted); cursor:pointer; text-transform:uppercase; white-space: nowrap; border-bottom: 2px solid transparent; }
.rubrique-tab.active-matieres { color:var(--gold-light); border-bottom-color: var(--gold); }
.rubrique-tab.active-ferrox { color:#e87070; border-bottom-color: #7a1f1f; }
.rubrique-tab.active-academie { color:#70a0e8; border-bottom-color: #1f3d7a; }

/* NAVIGATION FIXE */
.main-layout { display:flex; flex:1; width:100%; height:calc(100vh - 140px); }
nav { width:250px; min-width:250px; padding:1rem 0; border-right:1px solid rgba(201,168,76,.12); overflow-y:auto; background: rgba(10,8,4,0.4); }
.nav-title { font-family:'Cinzel Decorative'; font-size:.55rem; color:var(--gold-dark); letter-spacing:.2em; padding:1rem; border-bottom: 1px solid rgba(201,168,76,0.1); }
.nav-item { padding:.8rem 1.2rem; cursor:pointer; font-size:0.9rem; color:var(--muted); border-left:3px solid transparent; transition: 0.2s; }
.nav-item:hover { color:var(--gold-light); background: rgba(201,168,76,0.05); }
.nav-item.active { color:var(--gold-light); background:rgba(201,168,76,0.1); border-left-color:var(--gold); }

.content-area { flex:1; padding:1.5rem 2rem; overflow-y: auto; }
.course-panel { display:none; }
.course-panel.active { display:block; }

/* ÉDITEUR RICHE (Soutien Images) */
.course-editor { 
  width:100%; min-height:300px; background:rgba(10,8,4,0.8); 
  border:1px solid rgba(201,168,76,0.3); padding:1.5rem; 
  color:var(--parchment); font-family:inherit; font-size:1.1rem; 
  outline:none; line-height: 1.6; overflow-y: auto;
}
/* Style des images collées */
.course-editor img, .course-preview img { 
  max-width: 100%; height: auto; display: block; 
  margin: 1rem 0; border: 1px solid var(--gold-dark); 
  box-shadow: 0 0 10px rgba(0,0,0,0.5); border-radius: 2px;
}

.page-manager { display: flex; gap: 8px; margin-bottom: 1rem; flex-wrap: wrap; }
.page-tab { padding: 5px 12px; background: rgba(201, 168, 76, 0.05); border: 1px solid rgba(201, 168, 76, 0.2); color: var(--muted); cursor: pointer; font-size: 0.75rem; border-radius: 2px; }
.page-tab.active { background: rgba(201, 168, 76, 0.2); color: var(--gold-light); border-color: var(--gold); }

.preview-title { margin-top: 3rem; font-family: 'Cinzel Decorative'; font-size: 0.7rem; color: var(--gold); border-bottom: 1px solid rgba(201,168,76,0.2); padding-bottom: 0.5rem; }
.course-preview { background: rgba(255,255,255,0.02); padding: 2rem; border-radius: 4px; min-height: 100px; color:#e0d5ba; border: 1px solid rgba(201, 168, 76, 0.1); margin-top: 1rem; transition: background 0.5s; }
.save-flash { background: rgba(201, 168, 76, 0.15) !important; }

.save-btn { background: linear-gradient(to bottom, var(--gold), var(--gold-dark)); color: #000; border: none; padding: 1rem; font-family: 'Cinzel Decorative'; font-weight: bold; cursor: pointer; margin-top: 10px; width: 100%; text-transform: uppercase; border-radius: 2px; }

#sync-dot { position:fixed; top:1rem; right:1rem; width:10px; height:10px; border-radius:50%; background:#7a1f1f; z-index: 10000; }
#sync-dot.ok { background:#50c878; box-shadow: 0 0 10px #50c878; }
</style>
</head>
<body>
<div class="bg-ambiance"></div>
<div id="sync-dot"></div>

<div class="site-wrapper">
  <header><div class="school-name">École des Arts Arcanes</div></header>

  <div class="rubrique-bar">
    <div class="rubrique-tab active-matieres" id="tab-matieres" onclick="switchRubrique('matieres')">📚 Matières</div>
    <div class="rubrique-tab" id="tab-ferrox" onclick="switchRubrique('ferrox')">🩸 Ferrox</div>
    <div class="rubrique-tab" id="tab-academie" onclick="switchRubrique('academie')">🏛️ Académie</div>
  </div>

  <div class="main-layout">
    <nav id="side-nav">
      <div id="nav-title" class="nav-title">GRIMOIRE</div>
      <div id="nav-items-container"></div>
    </nav>

    <div class="content-area" id="main-content">
        <div id="panel-welcome" style="text-align: center; margin-top: 5rem; opacity: 0.5;">
            <p>✦ Sélectionnez un enseignement dans le menu de gauche ✦</p>
        </div>
    </div>
  </div>
</div>

<script>
const SB_URL = "https://eoglrxmqyrfxilnxbewx.supabase.co";
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVvZ2xyeG1xeXJmeGlsbnhiZXd4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0MjQxMDgsImV4cCI6MjA5MzAwMDEwOH0.PLxoyreQnp2_phV_y9lCx4RE_Tc4X0CrLyudR-VFXJI";

const DATA = {
    matieres: [
        {id:'sort',label:'⚡ Sortilèges'}, {id:'pot',label:'⚗️ Potions'}, {id:'bot',label:'🌿 Botanique'}, 
        {id:'disc',label:'📜 Discipline'}, {id:'culi',label:'🍵 Survie'}, {id:'dcfo',label:'🛡️ DCFO'}, 
        {id:'hist',label:'📖 Histoire'}, {id:'vol',label:'🧹 Vol'}, {id:'crea',label:'🐉 Créatures'}, {id:'divi',label:'🔮 Divination'}
    ],
    ferrox: [
        {id:'f_h',label:'📜 Histoire Ferrox'}, {id:'f_r',label:'🩸 Rituels & Sang'}, {id:'f_a',label:'⚔️ Armes & Combat'}, 
        {id:'f_al',label:'🔥 Alchimie Sombre'}, {id:'f_c',label:'🦅 Codes & Lois'}, {id:'f_m',label:'🩻 Hiérarchie'}, 
        {id:'f_ca',label:'🗺️ Cartographie'}, {id:'f_d',label:'📁 Divers'}
    ],
    academie: [
        {id:'a_r',label:'📋 Règles & Statuts'}, {id:'a_c',label:'🎓 Programmes'}, {id:'a_e',label:'✏️ Examens'}, 
        {id:'a_p',label:'👤 Professeurs'}, {id:'a_ev',label:'🌟 Événements'}, {id:'a_ca',label:'🗺️ Cartographie'}, 
        {id:'a_ar',label:'🗄️ Archives'}, {id:'a_d',label:'📁 Divers'}
    ]
};

let sb = supabase.createClient(SB_URL, SB_KEY);
let allCourseData = {}; 
let currentCourseId = null;
let currentPageId = null;
let currentRubrique = 'matieres';

// --- INITIALISATION ---
async function loadAll() {
  const { data } = await sb.from('notes').select('*');
  data?.forEach(n => {
    const baseId = n.id.split('_p')[0];
    if(!allCourseData[baseId]) allCourseData[baseId] = [];
    allCourseData[baseId].push({id: n.id, content: n.content});
  });
  switchRubrique('matieres');
  document.getElementById('sync-dot').classList.add('ok');
}

// --- NAVIGATION ---
function switchRubrique(rub) {
    currentRubrique = rub;
    document.querySelectorAll('.rubrique-tab').forEach(t => t.classList.remove('active-matieres', 'active-ferrox', 'active-academie'));
    document.getElementById('tab-' + rub).classList.add('active-' + rub);
    
    const container = document.getElementById('nav-items-container');
    container.innerHTML = DATA[rub].map(c => `
        <div class="nav-item" id="nav-${c.id}" onclick="selectCourse('${c.id}', '${c.label}')">
            ${c.label}
        </div>
    `).join('');
}

function selectCourse(id, label) {
    currentCourseId = id;
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById('nav-' + id).classList.add('active');

    if(!allCourseData[id]) allCourseData[id] = [{id: id + '_p1', content: ''}];
    
    currentPageId = allCourseData[id][0].id;
    renderEditor(label);
}

// --- LOGIQUE ÉDITEUR RICHE ---
function renderEditor(label) {
    const main = document.getElementById('main-content');
    const pages = allCourseData[currentCourseId];
    const activePage = pages.find(p => p.id === currentPageId);

    main.innerHTML = `
        <h2 style="font-family:Cinzel Decorative; color:var(--gold-light); margin-bottom:1rem;">${label}</h2>
        <div class="page-manager">
            ${pages.map((p, i) => `
                <div class="page-tab ${currentPageId === p.id ? 'active' : ''}" onclick="switchPage('${p.id}')">
                    Page ${i + 1}
                </div>
            `).join('')}
            <button class="page-tab" style="border:1px dashed var(--gold)" onclick="addPage()">+ Ajouter</button>
        </div>
        
        <div class="course-editor" id="editor" contenteditable="true" oninput="showLivePreview()">${activePage.content}</div>
        
        <button class="save-btn" onclick="save()">✦ Graver dans le grimoire</button>
        
        <div class="preview-title">📜 Parchemin Figé (Sauvegardé)</div>
        <div class="course-preview" id="preview">${activePage.content}</div>
    `;

    // Gestion du Coller (Ctrl+V) pour les images
    const ed = document.getElementById('editor');
    ed.addEventListener('paste', handlePaste);
}

function showLivePreview() {
    // La preview live montre ce qui est en train d'être écrit, mais n'est pas "figée"
    document.getElementById('preview').innerHTML = document.getElementById('editor').innerHTML;
}

async function handlePaste(e) {
    const items = (e.clipboardData || e.originalEvent.clipboardData).items;
    for (let item of items) {
        if (item.type.indexOf("image") !== -1) {
            e.preventDefault();
            const blob = item.getAsFile();
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = document.createElement("img");
                img.src = event.target.result;
                document.getElementById('editor').appendChild(img);
                showLivePreview();
            };
            reader.readAsDataURL(blob);
        }
    }
}

// --- ACTIONS ---
function switchPage(pid) {
    currentPageId = pid;
    const label = DATA[currentRubrique].find(c => c.id === currentCourseId).label;
    renderEditor(label);
}

function addPage() {
    const newId = currentCourseId + '_p' + Date.now();
    allCourseData[currentCourseId].push({id: newId, content: ''});
    currentPageId = newId;
    const label = DATA[currentRubrique].find(c => c.id === currentCourseId).label;
    renderEditor(label);
}

async function save() {
    const content = document.getElementById('editor').innerHTML;
    const prev = document.getElementById('preview');
    
    const { error } = await sb.from('notes').upsert({id: currentPageId, content: content});
    
    if(!error) {
        allCourseData[currentCourseId].find(p => p.id === currentPageId).content = content;
        prev.innerHTML = content;
        prev.classList.add('save-flash');
        setTimeout(() => prev.classList.remove('save-flash'), 600);
    } else {
        alert("Erreur de magie : " + error.message);
    }
}

loadAll();
</script>
</body>
</html>
