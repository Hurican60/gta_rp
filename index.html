<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>École des Arts Arcanes — Grimoire RP</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --gold: #c9a84c; --gold-light: #e8c97a; --gold-dark: #8a6a1f;
  --parchment: #f0e6cc; --muted: #7a6a4f; --deep: #0a0804;
  --accent-ferrox: #7a1f1f; --accent-acad: #1f3d7a;
}
body { background:#0a0804; font-family:'IM Fell English',serif; color:var(--parchment); min-height:100vh; overflow-x:hidden; }
.bg-ambiance { position:fixed; inset:0; pointer-events:none; z-index:0; background: radial-gradient(ellipse at 15% 40%,rgba(122,31,31,.07) 0%,transparent 55%), radial-gradient(ellipse at 85% 40%,rgba(31,61,122,.07) 0%,transparent 55%); }

/* SETUP */
#setup-overlay { position:fixed; inset:0; z-index:9999; background:rgba(5,4,2,.97); display:flex; align-items:center; justify-content:center; }
#setup-overlay.hidden { display:none; }
.setup-box { background:rgba(15,12,6,.9); border:1px solid var(--gold); border-radius:6px; padding:2.5rem; max-width:520px; width:90%; text-align:center; }
.setup-input { width:100%; background:rgba(8,6,2,.8); border:1px solid var(--gold-dark); border-radius:3px; color:var(--parchment); padding:.6rem .9rem; margin-bottom:1rem; outline:none; }
.setup-btn { width:100%; background:linear-gradient(135deg,var(--gold-dark),var(--gold)); color:#000; font-family:'Cinzel Decorative'; font-weight:bold; padding:.75rem; cursor:pointer; border:none; text-transform:uppercase; }

/* HEADER & TABS */
header { text-align:center; padding:2rem; border-bottom:1px solid rgba(201,168,76,.2); }
.school-name { font-family:'Cinzel Decorative',cursive; font-size:2rem; color:var(--gold-light); }
.rubrique-bar { display:flex; background:rgba(5,4,2,.8); border-bottom:1px solid rgba(201,168,76,.15); padding:0 2rem; }
.rubrique-tab { padding:1rem; font-family:'Cinzel Decorative'; font-size:.6rem; color:var(--muted); cursor:pointer; text-transform:uppercase; transition: 0.3s; }
.rubrique-tab.active-matieres { color:var(--gold-light); border-bottom: 2px solid var(--gold); }
.rubrique-tab.active-ferrox { color:#e87070; border-bottom: 2px solid var(--accent-ferrox); }
.rubrique-tab.active-academie { color:#70a0e8; border-bottom: 2px solid var(--accent-acad); }

/* LAYOUT */
.rubrique-panel { display:none; flex:1; }
.rubrique-panel.active { display:flex; }
.main-layout { display:flex; flex:1; width:100%; }
nav { width:240px; padding:1.5rem 0; border-right:1px solid rgba(201,168,76,.12); height:calc(100vh - 160px); overflow-y:auto; }
.nav-item { padding:.8rem 1.2rem; cursor:pointer; font-size:.9rem; color:var(--muted); border-left:3px solid transparent; }
.nav-item.active { color:var(--gold-light); background:rgba(201,168,76,0.1); border-left-color:var(--gold); }

/* SYSTEME DE PAGES */
.page-manager { display: flex; gap: 10px; margin-bottom: 1.5rem; flex-wrap: wrap; align-items: center; border-bottom: 1px solid rgba(201,168,76,0.1); padding-bottom: 10px; }
.page-tab { padding: 5px 15px; background: rgba(201,168,76,0.05); border: 1px solid rgba(201,168,76,0.2); color: var(--muted); cursor: pointer; font-size: 0.8rem; border-radius: 3px; }
.page-tab.active { background: rgba(201,168,76,0.2); color: var(--gold-light); border-color: var(--gold); }
.add-page-btn { padding: 5px 12px; background: none; border: 1px dashed var(--gold); color: var(--gold); cursor: pointer; font-size: 0.8rem; border-radius: 3px; }

/* EDITOR */
.content-area { flex:1; padding:2rem; }
.course-panel { display:none; }
.course-panel.active { display:block; }
.course-editor { width:100%; min-height:300px; background:rgba(10,8,4,0.7); border:1px solid rgba(201,168,76,0.2); padding:1rem; color:var(--parchment); font-family:inherit; font-size:1rem; outline:none; resize:vertical; }
.preview-title { margin: 2rem 0 1rem; font-family: 'Cinzel Decorative'; font-size: 0.7rem; color: var(--gold); border-bottom: 1px solid rgba(201,168,76,0.2); }
.course-preview { background: rgba(255,255,255,0.02); padding: 1.5rem; border-radius: 4px; min-height: 100px; white-space: pre-wrap; color:#e0d5ba; border: 1px solid rgba(201,168,76,0.05); }

/* BUTTONS */
.save-btn { background: var(--gold-dark); color: #000; border: none; padding: 0.6rem 1.5rem; font-family: 'Cinzel Decorative'; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s; }
.save-btn:hover { background: var(--gold-light); }
.del-page { color: #ff4d4d; font-size: 0.7rem; cursor: pointer; margin-left: 10px; opacity: 0.5; }
.del-page:hover { opacity: 1; }

/* IMAGES */
.image-upload-zone { border: 1px dashed var(--gold-dark); padding: 1.5rem; text-align: center; cursor: pointer; color: var(--gold); margin-top: 2rem; }
.image-upload-zone.dragover { background: rgba(201,168,76,0.1); }
.image-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; margin-top: 10px; }
.img-wrap { position: relative; border: 1px solid rgba(201,168,76,0.2); }
.img-wrap img { width: 100%; height: 80px; object-fit: cover; }
.img-del { position: absolute; top: 0; right: 0; background: red; color: white; border: none; padding: 2px 5px; cursor: pointer; font-size: 10px; }

#sync-dot { position:fixed; top:1rem; right:1rem; width:10px; height:10px; border-radius:50%; background:var(--gold-dark); }
#sync-dot.ok { background:#50c878; box-shadow: 0 0 10px #50c878; }
</style>
</head>
<body>
<div class="bg-ambiance"></div>
<div id="sync-dot"></div>

<div id="setup-overlay">
  <div class="setup-box">
    <div class="setup-title">⚙ Configuration Grimoire</div>
    <input class="setup-input" id="input-url" placeholder="URL Supabase">
    <input class="setup-input" id="input-key" placeholder="Clé Anon Public">
    <button class="setup-btn" onclick="connectSupabase()">✦ Ouvrir le Grimoire</button>
  </div>
</div>

<div class="site-wrapper">
  <header><div class="school-name">École des Arts Arcanes</div></header>

  <div class="rubrique-bar">
    <div class="rubrique-tab active-matieres" id="tab-matieres" onclick="switchRubrique('matieres')">📚 Matières</div>
    <div class="rubrique-tab" id="tab-ferrox" onclick="switchRubrique('ferrox')">🩸 Ferrox</div>
    <div class="rubrique-tab" id="tab-academie" onclick="switchRubrique('academie')">🏛️ Académie</div>
  </div>

  <div id="rubrique-matieres" class="rubrique-panel active">
    <div class="main-layout"><nav id="nav-matieres"></nav><div class="content-area" id="content-matieres"></div></div>
  </div>
  <div id="rubrique-ferrox" class="rubrique-panel">
    <div class="main-layout"><nav id="nav-ferrox"></nav><div class="content-area" id="content-ferrox"></div></div>
  </div>
  <div id="rubrique-academie" class="rubrique-panel">
    <div class="main-layout"><nav id="nav-academie"></nav><div class="content-area" id="content-academie"></div></div>
  </div>
</div>

<script>
// --- CONFIG ---
const MATIERES = [{id:'sortileges',icon:'⚡',label:'Sortilèges'}, {id:'potions',icon:'⚗️',label:'Potions'}, {id:'botanique',icon:'🌿',label:'Botanique'}, {id:'discipline',icon:'📜',label:'Discipline'}, {id:'culinaire',icon:'🍵',label:'Survie'}, {id:'dcfo',icon:'🛡️',label:'DCFO'}, {id:'histoire',icon:'📖',label:'Histoire'}, {id:'vol',icon:'🧹',label:'Vol'}, {id:'creatures',icon:'🐉',label:'Créatures'}, {id:'divination',icon:'🔮',label:'Divination'}];
const FERROX = [{id:'f-h',icon:'📜',label:'Histoire'}, {id:'f-r',icon:'🩸',label:'Rituels'}, {id:'f-a',icon:'⚔️',label:'Armes'}, {id:'f-al',icon:'🔥',label:'Alchimie'}, {id:'f-c',icon:'🦅',label:'Codes'}, {id:'f-m',icon:'🩻',label:'Hiérarchie'}, {id:'f-ca',icon:'🗺️',label:'Cartographie'}, {id:'f-d',icon:'📁',label:'Divers'}];
const ACAD = [{id:'a-r',icon:'📋',label:'Règles'}, {id:'a-c',icon:'🎓',label:'Programmes'}, {id:'a-e',icon:'✏️',label:'Examens'}, {id:'a-p',icon:'👤',label:'Profs'}, {id:'a-ev',icon:'🌟',label:'Events'}, {id:'a-ca',icon:'🗺️',label:'Cartographie'}, {id:'a-ar',icon:'🗄️',label:'Archives'}, {id:'a-d',icon:'📁',label:'Divers'}];

let sb = null;
let currentPages = {}; // Stocke l'ID de la page active par cours
const allCourseData = {}; // Cache local des pages

// --- SUPABASE ---
async function connectSupabase() {
  const url = document.getElementById('input-url').value.trim();
  const key = document.getElementById('input-key').value.trim();
  sb = supabase.createClient(url, key);
  const {error} = await sb.from('notes').select('id').limit(1);
  if (!error) {
    localStorage.setItem('sb_url', url); localStorage.setItem('sb_key', key);
    document.getElementById('setup-overlay').classList.add('hidden');
    document.getElementById('sync-dot').classList.add('ok');
    await loadData();
  } else { alert("Erreur de connexion"); }
}

async function loadData() {
  const {data} = await sb.from('notes').select('*').order('created_at', {ascending: true});
  data.forEach(note => {
    const [courseId, pageId] = note.id.split('_p_');
    if(!allCourseData[courseId]) allCourseData[courseId] = [];
    allCourseData[courseId].push({id: note.id, content: note.content});
  });
  // Initialiser la première page par défaut si vide
  [...MATIERES, ...FERROX, ...ACAD].forEach(c => {
    if(!allCourseData[c.id]) allCourseData[c.id] = [{id: c.id + '_p_1', content: ''}];
    renderPageSystem(c.id);
  });
}

// --- LOGIQUE MULTI-PAGES ---
function renderPageSystem(courseId) {
  const manager = document.getElementById('pages-' + courseId);
  if(!manager) return;
  const pages = allCourseData[courseId];
  if(!currentPages[courseId]) currentPages[courseId] = pages[0].id;

  let html = pages.map((p, index) => `
    <div class="page-tab ${currentPages[courseId] === p.id ? 'active' : ''}" onclick="switchPage('${courseId}', '${p.id}')">
      Page ${index + 1}
      ${index > 0 ? `<span class="del-page" onclick="deletePage(event, '${courseId}', '${p.id}')">✖</span>` : ''}
    </div>
  `).join('');
  html += `<button class="add-page-btn" onclick="addNewPage('${courseId}')">+ Ajouter une Page</button>`;
  manager.innerHTML = html;

  // Mettre à jour l'éditeur
  const activePage = pages.find(p => p.id === currentPages[courseId]);
  document.getElementById('editor-' + courseId).value = activePage.content;
  updatePreview(courseId);
}

function addNewPage(courseId) {
  const newId = courseId + '_p_' + Date.now();
  allCourseData[courseId].push({id: newId, content: ''});
  currentPages[courseId] = newId;
  renderPageSystem(courseId);
}

function switchPage(courseId, pageId) {
  currentPages[courseId] = pageId;
  renderPageSystem(courseId);
}

async function deletePage(e, courseId, pageId) {
  e.stopPropagation();
  if(!confirm("Supprimer cette page définitivement ?")) return;
  await sb.from('notes').delete().eq('id', pageId);
  allCourseData[courseId] = allCourseData[courseId].filter(p => p.id !== pageId);
  currentPages[courseId] = allCourseData[courseId][0].id;
  renderPageSystem(courseId);
}

// --- SAVE & UI ---
async function saveCourse(courseId) {
  const pageId = currentPages[courseId];
  const content = document.getElementById('editor-' + courseId).value;
  const {error} = await sb.from('notes').upsert({id: pageId, content: content});
  if(!error) {
    const pageObj = allCourseData[courseId].find(p => p.id === pageId);
    pageObj.content = content;
    updatePreview(courseId);
    alert("Page sauvegardée !");
  }
}

function updatePreview(id) {
  const val = document.getElementById('editor-' + id).value;
  document.getElementById('prev-' + id).innerHTML = val
    .replace(/^# (.*$)/gim, '<h1 style="color:var(--gold-light); font-family:Cinzel Decorative; font-size:1.2rem; margin-bottom:10px;">$1</h1>')
    .replace(/^• (.*$)/gim, '<div style="margin-bottom:5px;">● $1</div>');
}

function buildPanel(c, rub) {
  return `
  <div id="panel-${c.id}" class="course-panel">
    <h2 style="font-family:Cinzel Decorative; color:var(--gold-light); margin-bottom:10px;">${c.icon} ${c.label}</h2>
    
    <div class="page-manager" id="pages-${c.id}"></div>

    <div class="editor-toolbar">
      <button style="background:none; color:var(--muted); border:1px solid #333; padding:2px 8px; font-size:10px; cursor:pointer;" onclick="ins('${c.id}','# ')">Titre</button>
      <button style="background:none; color:var(--muted); border:1px solid #333; padding:2px 8px; font-size:10px; cursor:pointer;" onclick="ins('${c.id}','• ')">Liste</button>
    </div>
    <textarea class="course-editor" id="editor-${c.id}" placeholder="Écrivez ici..."></textarea>
    <button class="save-btn" onclick="saveCourse('${c.id}')">✦ Sauvegarder cette page</button>

    <div class="preview-title">📜 Aperçu du Grimoire</div>
    <div class="course-preview" id="prev-${c.id}"></div>

    <div class="preview-title">🖼️ Images</div>
    <div class="image-upload-zone" id="dz-${c.id}" ondrop="hDrop(event, '${c.id}')" ondragover="event.preventDefault()">Glissez vos images ici</div>
    <div class="image-grid" id="grid-${c.id}"></div>
  </div>`;
}

// --- NAVIGATION ---
function switchRubrique(n) {
  document.querySelectorAll('.rubrique-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.rubrique-tab').forEach(t => t.className = 'rubrique-tab');
  document.getElementById('rubrique-' + n).classList.add('active');
  document.getElementById('tab-' + n).classList.add('active-' + n);
}

function showCourse(id, el, rub) {
  document.querySelectorAll('.course-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('panel-' + id).classList.add('active');
  el.classList.add('active');
}

function ins(id, t) {
  const ta = document.getElementById('editor-' + id);
  const s = ta.selectionStart;
  ta.value = ta.value.substring(0, s) + t + ta.value.substring(ta.selectionEnd);
  ta.focus();
}

function buildAll() {
  const configs = [{c:MATIERES, r:'matieres'}, {c:FERROX, r:'ferrox'}, {c:ACAD, r:'academie'}];
  configs.forEach(conf => {
    const nav = document.getElementById('nav-' + conf.r), cont = document.getElementById('content-' + conf.r);
    conf.c.forEach((c, i) => {
      nav.innerHTML += `<div class="nav-item ${i === 0 ? 'active' : ''}" onclick="showCourse('${c.id}',this,'${conf.r}')">${c.icon} ${c.label}</div>`;
      cont.innerHTML += buildPanel(c, conf.r);
    });
  });
}

// --- IMAGES ---
async function hDrop(e, id) {
  e.preventDefault();
  const files = e.dataTransfer.files;
  for (const f of files) {
    const r = new FileReader();
    r.onload = async (ev) => {
      const b64 = ev.target.result;
      const {data} = await sb.from('images').insert({course_id: id, src: b64}).select().single();
      if(!imageStore[id]) imageStore[id] = [];
      imageStore[id].push({id: data.id, src: b64});
      renderGrid(id);
    };
    r.readAsDataURL(f);
  }
}

function renderGrid(id) {
  const g = document.getElementById('grid-' + id);
  g.innerHTML = (imageStore[id] || []).map((img, i) => `
    <div class="img-wrap"><img src="${img.src}"><button class="img-del" onclick="delImg('${id}', ${i})">X</button></div>
  `).join('');
}

async function delImg(id, i) {
  const img = imageStore[id][i];
  await sb.from('images').delete().eq('id', img.id);
  imageStore[id].splice(i, 1);
  renderGrid(id);
}

buildAll();
const savedUrl = localStorage.getItem('sb_url');
if(savedUrl) initSupabase();
</script>
</body>
</html>
