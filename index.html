<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>École des Arts Arcanes — GTA RP</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --gold: #c9a84c; --gold-light: #e8c97a; --gold-dark: #8a6a1f;
  --parchment: #f0e6cc; --muted: #7a6a4f; --deep: #0a0804;
  --accent-ferrox: #7a1f1f; --accent-ferrox-light: #c43030;
  --accent-acad: #1f3d7a; --accent-acad-light: #4a7bc4;
}
body { background:#0a0804; font-family:'IM Fell English',serif; color:var(--parchment); min-height:100vh; overflow-x:hidden; }
.bg-ambiance { position:fixed; inset:0; pointer-events:none; z-index:0;
  background: radial-gradient(ellipse at 15% 40%,rgba(122,31,31,.07) 0%,transparent 55%),
              radial-gradient(ellipse at 85% 40%,rgba(31,61,122,.07) 0%,transparent 55%),
              radial-gradient(ellipse at 50% 100%,rgba(201,168,76,.05) 0%,transparent 50%); }
.site-wrapper { position:relative; z-index:1; display:flex; flex-direction:column; min-height:100vh; }

/* SETUP OVERLAY */
#setup-overlay { position:fixed; inset:0; z-index:9999; background:rgba(5,4,2,.97); display:flex; align-items:center; justify-content:center; }
#setup-overlay.hidden { display:none; }
.setup-box { background:rgba(15,12,6,.9); border:1px solid rgba(201,168,76,.3); border-radius:6px; padding:2.5rem; max-width:520px; width:90%; text-align:center; }
.setup-title { font-family:'Cinzel Decorative',cursive; font-size:1.1rem; color:var(--gold-light); margin-bottom:.6rem; }
.setup-sub { font-style:italic; color:var(--muted); font-size:.88rem; margin-bottom:1.8rem; line-height:1.7; }
.setup-field { margin-bottom:1rem; text-align:left; }
.setup-label { font-family:'Cinzel Decorative',cursive; font-size:.55rem; letter-spacing:.18em; color:var(--muted); display:block; margin-bottom:.4rem; text-transform:uppercase; }
.setup-input { width:100%; background:rgba(8,6,2,.8); border:1px solid rgba(201,168,76,.2); border-radius:3px; color:var(--parchment); font-family:'IM Fell English',serif; font-size:.9rem; padding:.6rem .9rem; outline:none; }
.setup-btn { margin-top:.5rem; width:100%; background:linear-gradient(135deg,rgba(201,168,76,.15),rgba(201,168,76,.05)); border:1px solid rgba(201,168,76,.4); color:var(--gold-light); font-family:'Cinzel Decorative',cursive; font-size:.6rem; letter-spacing:.15em; padding:.75rem 2rem; cursor:pointer; border-radius:3px; transition:all .2s; text-transform:uppercase; }

/* SYNC INDICATOR & TOASTS */
#sync-dot { position:fixed; top:1rem; right:1rem; z-index:500; width:8px; height:8px; border-radius:50%; background:var(--gold-dark); }
#sync-dot.syncing { background:#e8c97a; animation:pulse .8s infinite; }
#sync-dot.ok { background:#50c878; }
#sync-dot.err { background:#e87070; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
#status-bar { position:fixed; bottom:1rem; right:1rem; z-index:500; display:flex; flex-direction:column; gap:.4rem; }
.status-toast { background:rgba(10,8,3,.92); border:1px solid rgba(201,168,76,.25); border-radius:4px; padding:.5rem 1rem; font-size:.82rem; color:var(--parchment); font-style:italic; opacity:0; transform:translateY(8px); transition:all .3s; }
.status-toast.show { opacity:1; transform:translateY(0); }
.status-toast.success { border-color:rgba(100,200,100,.3); color:#90e890; }
.status-toast.error { border-color:rgba(196,48,48,.3); color:#e87070; }

/* HEADER & NAV */
header { text-align:center; padding:2.2rem 2rem 1.5rem; border-bottom:1px solid rgba(201,168,76,.2); }
.school-name { font-family:'Cinzel Decorative',cursive; font-size:clamp(1.3rem,3.5vw,2.5rem); color:var(--gold-light); }
.rubrique-bar { display:flex; align-items:center; background:rgba(5,4,2,.8); border-bottom:1px solid rgba(201,168,76,.15); padding:0 2rem; overflow-x:auto; }
.rubrique-tab { padding:.9rem 1.8rem; font-family:'Cinzel Decorative',cursive; font-size:.62rem; color:var(--muted); cursor:pointer; text-transform:uppercase; }
.rubrique-tab.active-matieres { color:var(--gold-light); border-bottom:2px solid var(--gold); }
.rubrique-tab.active-ferrox { color:#e87070; border-bottom:2px solid var(--accent-ferrox-light); }
.rubrique-tab.active-academie { color:#70a0e8; border-bottom:2px solid var(--accent-acad-light); }

.main-layout { display:flex; flex:1; max-width:1300px; margin:0 auto; width:100%; }
nav { width:250px; padding:1.5rem 0; border-right:1px solid rgba(201,168,76,.12); position:sticky; top:0; height:calc(100vh - 158px); overflow-y:auto; }
.nav-item { padding:.65rem 1.2rem; cursor:pointer; font-size:.88rem; color:var(--muted); border-left:3px solid transparent; }
.nav-item.active { color:var(--gold-light); background:rgba(201,168,76,.08); border-left-color:var(--gold); }
.nav-item.active-ferrox-item { color:#e87070; background:rgba(122,31,31,.1); border-left-color:var(--accent-ferrox-light); }
.nav-item.active-acad-item { color:#70a0e8; background:rgba(31,61,122,.1); border-left-color:var(--accent-acad-light); }

/* EDITOR & PREVIEW */
.content-area { flex:1; padding:2rem 2.5rem; }
.course-panel { display:none; }
.course-panel.active { display:block; }
.course-editor { width:100%; min-height:300px; background:rgba(8,6,2,.7); border:1px solid rgba(201,168,76,.18); padding:1.1rem; color:var(--parchment); font-family:inherit; font-size:.97rem; line-height:1.6; resize:vertical; outline:none; }

/* --- NOUVEAUX STYLES PRÉVISUALISATION --- */
.preview-title { margin-top: 2.5rem; font-family: 'Cinzel Decorative', cursive; font-size: 0.7rem; color: var(--gold); letter-spacing: 0.2em; text-transform: uppercase; border-bottom: 1px solid rgba(201,168,76,0.2); padding-bottom: 0.5rem; margin-bottom: 1rem; }
.course-preview { background: rgba(240, 230, 204, 0.03); border: 1px solid rgba(201, 168, 76, 0.1); padding: 2rem; border-radius: 4px; line-height: 1.8; color: #e0d5ba; min-height: 100px; white-space: pre-wrap; margin-bottom: 3rem; }
.preview-h1 { color: var(--gold-light); font-family: 'Cinzel Decorative', cursive; font-size: 1.4rem; margin-top: 1rem; display: block; border-bottom: 1px solid rgba(201,168,76,0.15); }
.preview-h2 { color: var(--gold); font-family: 'Cinzel Decorative', cursive; font-size: 1.1rem; margin-top: 0.8rem; display: block; }
.preview-bullet { color: var(--gold); margin-right: 8px; font-weight: bold; }
/* ---------------------------------------- */

.editor-toolbar { display:flex; gap:3px; background:rgba(201,168,76,.04); border:1px solid rgba(201,168,76,.13); border-bottom:none; padding:5px 7px; }
.toolbar-btn { background:none; border:1px solid transparent; color:var(--muted); cursor:pointer; padding:3px 7px; font-size:11px; }
.save-row { display:flex; align-items:center; justify-content:space-between; margin-top:1rem; }
.save-btn { background:linear-gradient(135deg,rgba(201,168,76,.12),rgba(201,168,76,.04)); border:1px solid rgba(201,168,76,.35); color:var(--gold-light); font-family:'Cinzel Decorative',cursive; font-size:.58rem; padding:.6rem 1.5rem; cursor:pointer; }

/* IMAGES */
.image-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:10px; margin-top:1rem; }
.image-card { position:relative; border-radius:4px; overflow:hidden; border:1px solid rgba(201,168,76,.15); aspect-ratio:4/3; }
.image-card img { width:100%; height:100%; object-fit:cover; }
.section-tabs { display:flex; border-bottom:1px solid rgba(201,168,76,.15); margin-bottom:1rem; }
.section-tab { padding:.55rem 1.2rem; font-family:'Cinzel Decorative',cursive; font-size:.55rem; color:var(--muted); cursor:pointer; }
.section-tab.active { color:var(--gold-light); border-bottom:2px solid var(--gold); }
.tab-content { display:none; }
.tab-content.active { display:block; }
</style>
</head>
<body>
<div class="bg-ambiance"></div>
<div id="sync-dot"></div>

<div id="setup-overlay">
  <div class="setup-box">
    <div class="setup-title">⚙ Configuration Supabase</div>
    <div class="setup-sub">Connecte ta base de données pour sauvegarder tes cours.</div>
    <div class="setup-field"><label class="setup-label">Project URL</label><input class="setup-input" id="input-url" type="url"></div>
    <div class="setup-field"><label class="setup-label">Anon Public Key</label><input class="setup-input" id="input-key" type="text"></div>
    <button class="setup-btn" onclick="connectSupabase()">✦ Lancer le Grimoire</button>
    <div id="setup-error" style="color:#e87070; font-size:.8rem; margin-top:10px;"></div>
  </div>
</div>

<div class="site-wrapper">
  <header>
    <div class="school-name">École des Arts Arcanes</div>
    <div style="font-style:italic; color:var(--muted); font-size:.9rem;">Grimoire Pédagogique</div>
  </header>

  <div class="rubrique-bar">
    <div class="rubrique-tab active-matieres" id="tab-matieres" onclick="switchRubrique('matieres')">📚 Matières</div>
    <div class="rubrique-tab" id="tab-ferrox" onclick="switchRubrique('ferrox')">🩸 Ferrox</div>
    <div class="rubrique-tab" id="tab-academie" onclick="switchRubrique('academie')">🏛️ Académie</div>
  </div>

  <div id="rubrique-matieres" class="rubrique-panel active"><div class="main-layout"><nav id="nav-matieres"></nav><div class="content-area" id="content-matieres"></div></div></div>
  <div id="rubrique-ferrox" class="rubrique-panel"><div class="main-layout"><nav id="nav-ferrox"></nav><div class="content-area" id="content-ferrox"></div></div></div>
  <div id="rubrique-academie" class="rubrique-panel"><div class="main-layout"><nav id="nav-academie"></nav><div class="content-area" id="content-academie"></div></div></div>
</div>

<div id="status-bar"></div>

<script>
const MATIERES = [
  {id:'sortileges',icon:'⚡',label:'Sortilèges',meta:"L'art du geste et de la parole"},
  {id:'potions',icon:'⚗️',label:'Potions',meta:"Alchimie et chaudrons"},
  {id:'botanique',icon:'🌿',label:'Botanique',meta:"Plantes et racines magiques"}
];
const FERROX_COURSES = [{id:'ferrox-hist',icon:'📜',label:'Histoire Ferrox',meta:"Origines de la lignée"}];
const ACADEMIE_COURSES = [{id:'acad-regles',icon:'📋',label:'Règles',meta:"Lois de l'établissement"}];
const ALL_COURSES = [...MATIERES,...FERROX_COURSES,...ACADEMIE_COURSES];

let sb = null;
const imageStore = {};
let saveTimers = {};

// --- SUPABASE ---
async function connectSupabase() {
  const url = document.getElementById('input-url').value.trim();
  const key = document.getElementById('input-key').value.trim();
  try {
    sb = supabase.createClient(url, key);
    const {error} = await sb.from('notes').select('id').limit(1);
    if (error) throw error;
    localStorage.setItem('sb_url', url); localStorage.setItem('sb_key', key);
    document.getElementById('setup-overlay').classList.add('hidden');
    setSyncDot('ok'); await loadAllData();
  } catch(e) { document.getElementById('setup-error').textContent = "Erreur de connexion"; }
}

async function initSupabase() {
  const url = localStorage.getItem('sb_url'), key = localStorage.getItem('sb_key');
  if (url && key) {
    sb = supabase.createClient(url, key);
    document.getElementById('setup-overlay').classList.add('hidden');
    setSyncDot('ok'); await loadAllData();
  }
}

// --- LOGIQUE DE RENDU (PRÉVISUALISATION) ---
function updatePreview(id) {
  const ta = document.getElementById('editor-' + id);
  const prev = document.getElementById('preview-' + id);
  if (!ta || !prev) return;

  let text = ta.value;
  if (!text.trim()) {
    prev.innerHTML = '<p style="color:var(--muted); font-style:italic;">En attente de texte...</p>';
    return;
  }

  // Rendu simple : Titres (# et ##), Puces (• et —)
  let html = text
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;") // Sécurité
    .replace(/^# (.*$)/gim, '<span class="preview-h1">$1</span>')
    .replace(/^## (.*$)/gim, '<span class="preview-h2">$1</span>')
    .replace(/^• (.*$)/gim, '<div><span class="preview-bullet">●</span> $1</div>')
    .replace(/^— (.*$)/gim, '<div><span class="preview-bullet">❧</span> $1</div>');

  prev.innerHTML = html;
}

async function loadAllData() {
  if (!sb) return;
  setSyncDot('syncing');
  const {data:notes} = await sb.from('notes').select('*');
  (notes||[]).forEach(n => {
    const ta = document.getElementById('editor-'+n.id);
    if (ta) { 
        ta.value = n.content || ''; 
        updatePreview(n.id); // Met à jour la preview au chargement
    }
  });
  setSyncDot('ok');
}

async function saveCourse(id) {
  const ta = document.getElementById('editor-'+id);
  if (!ta || !sb) return;
  setSyncDot('syncing');
  const {error} = await sb.from('notes').upsert({id, content: ta.value, updated_at: new Date().toISOString()});
  if (!error) { toast('Sauvegardé', 'success'); setSyncDot('ok'); }
  else { toast('Erreur RLS : Vérifie tes politiques Supabase', 'error'); setSyncDot('err'); }
}

function scheduleAutoSave(id) {
  clearTimeout(saveTimers[id]);
  saveTimers[id] = setTimeout(() => saveCourse(id), 2000);
}

// --- UI BUILDER ---
function buildPanel(course, rubrique) {
  return `
  <div id="panel-${course.id}" class="course-panel">
    <h2 style="font-family:'Cinzel Decorative'; color:var(--gold-light); margin-bottom:1rem;">${course.icon} ${course.label}</h2>
    <div class="section-tabs">
        <div class="section-tab active" onclick="switchTab('${course.id}','notes',this)">Notes</div>
        <div class="section-tab" onclick="switchTab('${course.id}','images',this)">Images</div>
    </div>
    <div id="tab-${course.id}-notes" class="tab-content active">
      <div class="editor-toolbar">
        <button class="toolbar-btn" onclick="ins('${course.id}','# ')">Titre</button>
        <button class="toolbar-btn" onclick="ins('${course.id}','## ')">Sous-titre</button>
        <button class="toolbar-btn" onclick="ins('${course.id}','• ')">Liste</button>
      </div>
      <textarea class="course-editor" id="editor-${course.id}" oninput="updatePreview('${course.id}'); scheduleAutoSave('${course.id}')"></textarea>
      <div class="save-row">
        <button class="save-btn" onclick="saveCourse('${course.id}')">✦ Sauvegarder</button>
        <span style="font-size:.7rem; color:var(--muted)">Auto-save actif</span>
      </div>
      
      <div class="preview-title">📜 Parchemin de lecture</div>
      <div class="course-preview" id="preview-${course.id}"></div>
    </div>
    <div id="tab-${course.id}-images" class="tab-content"><div class="image-grid" id="grid-${course.id}"></div></div>
  </div>`;
}

function ins(id, text) {
  const ta = document.getElementById('editor-'+id);
  const s = ta.selectionStart;
  ta.value = ta.value.substring(0,s) + text + ta.value.substring(ta.selectionEnd);
  updatePreview(id);
}

function buildAll() {
  const configs = [{c:MATIERES, r:'matieres'}, {c:FERROX_COURSES, r:'ferrox'}, {c:ACADEMIE_COURSES, r:'academie'}];
  configs.forEach(conf => {
    const nav = document.getElementById('nav-'+conf.r);
    const cont = document.getElementById('content-'+conf.r);
    conf.c.forEach((c,i) => {
      nav.innerHTML += `<div class="nav-item ${i===0?'active':''}" onclick="showCourse('${c.id}',this,'${conf.r}')">${c.icon} ${c.label}</div>`;
      cont.innerHTML += buildPanel(c, conf.r);
    });
    if(conf.c[0]) document.getElementById('panel-'+conf.c[0].id).classList.add('active');
  });
}

function showCourse(id, el, r) {
  document.getElementById('content-'+r).querySelectorAll('.course-panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.getElementById('panel-'+id).classList.add('active');
  el.classList.add('active');
}

function switchRubrique(n) {
  document.querySelectorAll('.rubrique-panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.rubrique-tab').forEach(t=>t.className='rubrique-tab');
  document.getElementById('rubrique-'+n).classList.add('active');
  document.getElementById('tab-'+n).classList.add('active-'+n);
}

function switchTab(id, tab, el) {
  const p = document.getElementById('panel-'+id);
  p.querySelectorAll('.section-tab').forEach(t=>t.classList.remove('active'));
  p.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tab-'+id+'-'+tab).classList.add('active');
}

function setSyncDot(s) { const d = document.getElementById('sync-dot'); d.className = s; }
function toast(m, t) {
  const b = document.getElementById('status-bar');
  const e = document.createElement('div'); e.className = 'status-toast '+t; e.textContent = m;
  b.appendChild(e); setTimeout(()=>e.classList.add('show'),10);
  setTimeout(()=>{ e.classList.remove('show'); setTimeout(()=>e.remove(),400); }, 2000);
}

buildAll();
initSupabase();
</script>
</body>
</html>
