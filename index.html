<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>École des Arts Arcanes — Grimoire RP</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --gold: #c9a84c; --gold-light: #e8c97a; --gold-dark: #8a6a1f;
  --parchment: #f0e6cc; --muted: #7a6a4f; --deep: #0a0804;
  --accent-ferrox: #7a1f1f; --accent-acad: #1f3d7a;
}
body { background:#0a0804; font-family:'IM Fell English',serif; color:var(--parchment); min-height:100vh; overflow-x:hidden; }
.bg-ambiance { position:fixed; inset:0; pointer-events:none; z-index:0; background: radial-gradient(ellipse at 15% 40%,rgba(122,31,31,.07) 0%,transparent 55%), radial-gradient(ellipse at 85% 40%,rgba(31,61,122,.07) 0%,transparent 55%); }

/* SETUP */
#setup-overlay { position:fixed; inset:0; z-index:9999; background:rgba(5,4,2,.97); display:flex; align-items:center; justify-content:center; }
#setup-overlay.hidden { display:none; }
.setup-box { background:rgba(15,12,6,.9); border:1px solid var(--gold); border-radius:6px; padding:2.5rem; max-width:520px; width:90%; text-align:center; }
.setup-input { width:100%; background:rgba(8,6,2,.8); border:1px solid var(--gold-dark); border-radius:3px; color:var(--parchment); padding:.6rem .9rem; margin-bottom:1rem; outline:none; }
.setup-btn { width:100%; background:linear-gradient(135deg,var(--gold-dark),var(--gold)); color:#000; font-family:'Cinzel Decorative'; font-weight:bold; padding:.75rem; cursor:pointer; border:none; text-transform:uppercase; }

/* HEADER & TABS */
header { text-align:center; padding:2rem; border-bottom:1px solid rgba(201,168,76,.2); }
.school-name { font-family:'Cinzel Decorative',cursive; font-size:2rem; color:var(--gold-light); }
.rubrique-bar { display:flex; background:rgba(5,4,2,.8); border-bottom:1px solid rgba(201,168,76,.15); padding:0 2rem; overflow-x: auto; }
.rubrique-tab { padding:1rem; font-family:'Cinzel Decorative'; font-size:.65rem; color:var(--muted); cursor:pointer; text-transform:uppercase; transition: 0.3s; white-space: nowrap; }
.rubrique-tab.active-matieres { color:var(--gold-light); border-bottom: 2px solid var(--gold); }
.rubrique-tab.active-ferrox { color:#e87070; border-bottom: 2px solid #7a1f1f; }
.rubrique-tab.active-academie { color:#70a0e8; border-bottom: 2px solid #1f3d7a; }

/* LAYOUT */
.rubrique-panel { display:none; flex:1; }
.rubrique-panel.active { display:flex; }
.main-layout { display:flex; flex:1; width:100%; }
nav { width:240px; padding:1.5rem 0; border-right:1px solid rgba(201,168,76,.12); height:calc(100vh - 160px); overflow-y:auto; }
.nav-item { padding:.8rem 1.2rem; cursor:pointer; font-size:.9rem; color:var(--muted); border-left:3px solid transparent; }
.nav-item.active { color:var(--gold-light); background:rgba(201,168,76,0.1); border-left-color:var(--gold); }

/* PAGES */
.page-manager { display: flex; gap: 8px; margin-bottom: 1rem; flex-wrap: wrap; }
.page-tab { padding: 4px 12px; background: rgba(201, 168, 76, 0.05); border: 1px solid rgba(201, 168, 76, 0.2); color: var(--muted); cursor: pointer; font-size: 0.75rem; border-radius: 2px; }
.page-tab.active { background: rgba(201, 168, 76, 0.2); color: var(--gold-light); border-color: var(--gold); }
.add-page-btn { padding: 4px 10px; background: none; border: 1px dashed var(--gold); color: var(--gold); cursor: pointer; font-size: 0.75rem; }

/* EDITOR */
.content-area { flex:1; padding:2rem; overflow-y: auto; height:calc(100vh - 160px); }
.course-panel { display:none; }
.course-panel.active { display:block; }
.course-editor { width:100%; min-height:250px; background:rgba(10,8,4,0.7); border:1px solid rgba(201,168,76,0.3); padding:1rem; color:var(--parchment); font-family:inherit; font-size:1rem; outline:none; resize:vertical; }
.course-preview { background: rgba(255,255,255,0.02); padding: 2rem; border-radius: 4px; min-height: 100px; white-space: pre-wrap; color:#e0d5ba; border: 1px solid rgba(201,168,76,0.1); margin-top: 1rem; }
.preview-h1 { color: var(--gold-light); font-family: 'Cinzel Decorative'; font-size: 1.4rem; margin: 1rem 0; display: block; border-bottom: 1px solid rgba(201,168,76,0.2); }

/* IMAGES */
.image-upload-zone { border: 2px dashed rgba(201, 168, 76, 0.3); padding: 2rem; text-align: center; cursor: pointer; color: var(--gold-light); margin-top: 2rem; transition: 0.3s; }
.image-upload-zone:hover, .image-upload-zone.dragover { background: rgba(201, 168, 76, 0.1); border-color: var(--gold); }
.image-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; margin-top: 1rem; }
.img-wrap { position: relative; border: 1px solid rgba(201, 168, 76, 0.2); aspect-ratio: 4/3; }
.img-wrap img { width: 100%; height: 100%; object-fit: cover; }
.img-del { position: absolute; top: 2px; right: 2px; background: #7a1f1f; color: white; border: none; padding: 2px 6px; cursor: pointer; font-size: 10px; }

.save-btn { background: linear-gradient(to bottom, var(--gold), var(--gold-dark)); color: #000; border: none; padding: 0.8rem 2rem; font-family: 'Cinzel Decorative'; font-weight: bold; cursor: pointer; margin-top: 15px; width: 100%; text-transform: uppercase; }

#sync-dot { position:fixed; top:1rem; right:1rem; width:10px; height:10px; border-radius:50%; background:#7a1f1f; }
#sync-dot.ok { background:#50c878; box-shadow: 0 0 10px #50c878; }
</style>
</head>
<body>
<div class="bg-ambiance"></div>
<div id="sync-dot"></div>

<div id="setup-overlay">
  <div class="setup-box">
    <div class="setup-title">⚙ Configuration Grimoire</div>
    <input class="setup-input" id="input-url" placeholder="URL Supabase">
    <input class="setup-input" id="input-key" placeholder="Clé Anon Public">
    <button class="setup-btn" onclick="connectSupabase()">✦ Ouvrir le Grimoire</button>
  </div>
</div>

<div class="site-wrapper">
  <header><div class="school-name">École des Arts Arcanes</div></header>

  <div class="rubrique-bar">
    <div class="rubrique-tab active-matieres" id="tab-matieres" onclick="switchRubrique('matieres')">📚 Matières</div>
    <div class="rubrique-tab" id="tab-ferrox" onclick="switchRubrique('ferrox')">🩸 Ferrox</div>
    <div class="rubrique-tab" id="tab-academie" onclick="switchRubrique('academie')">🏛️ Académie</div>
  </div>

  <div id="rubrique-matieres" class="rubrique-panel active"><div class="main-layout"><nav id="nav-matieres"></nav><div class="content-area" id="content-matieres"></div></div></div>
  <div id="rubrique-ferrox" class="rubrique-panel"><div class="main-layout"><nav id="nav-ferrox"></nav><div class="content-area" id="content-ferrox"></div></div></div>
  <div id="rubrique-academie" class="rubrique-panel"><div class="main-layout"><nav id="nav-academie"></nav><div class="content-area" id="content-academie"></div></div></div>
</div>

<script>
const MATIERES = [{id:'sort',label:'⚡ Sortilèges'}, {id:'pot',label:'⚗️ Potions'}, {id:'bot',label:'🌿 Botanique'}, {id:'disc',label:'📜 Discipline'}, {id:'culi',label:'🍵 Survie'}, {id:'dcfo',label:'🛡️ DCFO'}, {id:'hist',label:'📖 Histoire'}, {id:'vol',label:'🧹 Vol'}, {id:'crea',label:'🐉 Créatures'}, {id:'divi',label:'🔮 Divination'}];
const FERROX = [{id:'f_h',label:'📜 Histoire'}, {id:'f_r',label:'🩸 Rituels'}, {id:'f_a',label:'⚔️ Armes'}, {id:'f_al',label:'🔥 Alchimie'}, {id:'f_c',label:'🦅 Codes'}, {id:'f_m',label:'🩻 Hiérarchie'}, {id:'f_ca',label:'🗺️ Cartographie'}, {id:'f_d',label:'📁 Divers'}];
const ACAD = [{id:'a_r',label:'📋 Règles'}, {id:'a_c',label:'🎓 Programmes'}, {id:'a_e',label:'✏️ Examens'}, {id:'a_p',label:'👤 Profs'}, {id:'a_ev',label:'🌟 Events'}, {id:'a_ca',label:'🗺️ Cartographie'}, {id:'a_ar',label:'🗄️ Archives'}, {id:'a_d',label:'📁 Divers'}];

let sb = null;
let allCourseData = {}; 
let currentPages = {};
const imageStore = {};

async function connectSupabase() {
  const url = document.getElementById('input-url').value.trim();
  const key = document.getElementById('input-key').value.trim();
  if(!url || !key) return;
  sb = supabase.createClient(url, key);
  const {error} = await sb.from('notes').select('id').limit(1);
  if (!error) {
    localStorage.setItem('sb_url', url); localStorage.setItem('sb_key', key);
    document.getElementById('setup-overlay').classList.add('hidden');
    document.getElementById('sync-dot').classList.add('ok');
    await loadData();
  } else { alert("Erreur: Vérifiez vos clés et les RLS sur Supabase."); }
}

async function loadData() {
  const {data: notes} = await sb.from('notes').select('*');
  const {data: imgs} = await sb.from('images').select('*');

  notes?.forEach(n => {
    const baseId = n.id.split('_p')[0];
    if(!allCourseData[baseId]) allCourseData[baseId] = [];
    allCourseData[baseId].push({id: n.id, content: n.content});
  });

  imgs?.forEach(img => {
    if(!imageStore[img.course_id]) imageStore[img.course_id] = [];
    imageStore[img.course_id].push({id: img.id, src: img.src});
  });

  [...MATIERES, ...FERROX, ...ACAD].forEach(c => {
    if(!allCourseData[c.id]) allCourseData[c.id] = [{id: c.id + '_p1', content: ''}];
    renderPageSystem(c.id);
    renderGrid(c.id);
  });
}

function renderPageSystem(courseId) {
  const manager = document.getElementById('pages-' + courseId);
  const pages = allCourseData[courseId] || [{id: courseId + '_p1', content: ''}];
  if(!currentPages[courseId]) currentPages[courseId] = pages[0].id;

  manager.innerHTML = pages.map((p, i) => `
    <div class="page-tab ${currentPages[courseId] === p.id ? 'active' : ''}" onclick="switchPage('${courseId}', '${p.id}')">
      Page ${i + 1} ${i > 0 ? `<span onclick="deletePage(event, '${courseId}', '${p.id}')" style="margin-left:5px;color:red">×</span>` : ''}
    </div>
  `).join('') + `<button class="add-page-btn" onclick="addNewPage('${courseId}')">+ Page</button>`;

  const activePage = pages.find(p => p.id === currentPages[courseId]);
  document.getElementById('editor-' + courseId).value = activePage.content;
  updatePreview(courseId);
}

function addNewPage(courseId) {
  const newId = courseId + '_p' + Date.now();
  allCourseData[courseId].push({id: newId, content: ''});
  currentPages[courseId] = newId;
  renderPageSystem(courseId);
}

function switchPage(courseId, pageId) {
  currentPages[courseId] = pageId;
  renderPageSystem(courseId);
}

async function saveCourse(courseId) {
  const pageId = currentPages[courseId];
  const content = document.getElementById('editor-' + courseId).value;
  const {error} = await sb.from('notes').upsert({id: pageId, content: content});
  if(!error) {
    const p = allCourseData[courseId].find(x => x.id === pageId);
    p.content = content;
    updatePreview(courseId);
    alert("Savoir sauvegardé !");
  }
}

function updatePreview(id) {
  const val = document.getElementById('editor-' + id).value;
  document.getElementById('prev-' + id).innerHTML = val
    .replace(/^# (.*$)/gim, '<span class="preview-h1">$1</span>')
    .replace(/^• (.*$)/gim, '<div>• $1</div>');
}

// --- IMAGES & DRAG AND DROP ---
async function uploadImage(courseId, file) {
  const reader = new FileReader();
  reader.onload = async (e) => {
    const b64 = e.target.result;
    const {data, error} = await sb.from('images').insert({course_id: courseId, src: b64}).select().single();
    if(!error) {
      if(!imageStore[courseId]) imageStore[courseId] = [];
      imageStore[courseId].push({id: data.id, src: b64});
      renderGrid(courseId);
    }
  };
  reader.readAsDataURL(file);
}

function handleDrop(e, courseId) {
  e.preventDefault();
  const zone = document.getElementById('dz-' + courseId);
  zone.classList.remove('dragover');
  const files = e.dataTransfer.files;
  for(let f of files) uploadImage(courseId, f);
}

function renderGrid(id) {
  const g = document.getElementById('grid-' + id);
  if(!g) return;
  g.innerHTML = (imageStore[id] || []).map((img, i) => `
    <div class="img-wrap"><img src="${img.src}"><button class="img-del" onclick="delImg('${id}', ${i})">×</button></div>
  `).join('');
}

async function delImg(courseId, i) {
  const img = imageStore[courseId][i];
  await sb.from('images').delete().eq('id', img.id);
  imageStore[courseId].splice(i, 1);
  renderGrid(courseId);
}

// --- UI HELPERS ---
function buildPanel(c) {
  return `
  <div id="panel-${c.id}" class="course-panel">
    <h2 style="font-family:Cinzel Decorative; color:var(--gold-light); margin-bottom:1rem;">${c.label}</h2>
    <div class="page-manager" id="pages-${c.id}"></div>
    <textarea class="course-editor" id="editor-${c.id}" oninput="updatePreview('${c.id}')"></textarea>
    <button class="save-btn" onclick="saveCourse('${c.id}')">✦ Sauvegarder la page</button>
    <div class="course-preview" id="prev-${c.id}"></div>
    <div class="image-upload-zone" id="dz-${c.id}" 
         ondragover="event.preventDefault(); this.classList.add('dragover')" 
         ondragleave="this.classList.remove('dragover')"
         ondrop="handleDrop(event, '${c.id}')"
         onclick="document.getElementById('f-${c.id}').click()">
      Glissez vos images ici ou cliquez
    </div>
    <input type="file" id="f-${c.id}" hidden multiple onchange="for(let f of this.files) uploadImage('${c.id}', f)">
    <div class="image-grid" id="grid-${c.id}"></div>
  </div>`;
}

function buildAll() {
  const configs = [{c:MATIERES, r:'matieres'}, {c:FERROX, r:'ferrox'}, {c:ACAD, r:'academie'}];
  configs.forEach(conf => {
    const nav = document.getElementById('nav-' + conf.r), cont = document.getElementById('content-' + conf.r);
    conf.c.forEach((c, i) => {
      nav.innerHTML += `<div class="nav-item ${i === 0 ? 'active' : ''}" onclick="showCourse('${c.id}',this)">${c.label}</div>`;
      cont.innerHTML += buildPanel(c);
    });
  });
}

function showCourse(id, el) {
  document.querySelectorAll('.course-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('panel-' + id).classList.add('active');
  el.classList.add('active');
}

function switchRubrique(n) {
  document.querySelectorAll('.rubrique-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.rubrique-tab').forEach(t => t.className = 'rubrique-tab');
  document.getElementById('rubrique-' + n).classList.add('active');
  document.getElementById('tab-' + n).classList.add('active-' + n);
}

buildAll();
const u = localStorage.getItem('sb_url'), k = localStorage.getItem('sb_key');
if(u && k) { 
  document.getElementById('input-url').value = u; 
  document.getElementById('input-key').value = k;
  connectSupabase(); 
}
</script>
</body>
</html>
