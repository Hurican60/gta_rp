<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>École des Arts Arcanes — Grimoire RP</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --gold: #c9a84c; --gold-light: #e8c97a; --gold-dark: #8a6a1f;
  --parchment: #f0e6cc; --muted: #7a6a4f; --deep: #0a0804;
  --blood: #7a1f1f;
}
body { background:#0a0804; font-family:'IM Fell English',serif; color:var(--parchment); min-height:100vh; overflow-x:hidden; }
.bg-ambiance { position:fixed; inset:0; pointer-events:none; z-index:0; background: radial-gradient(ellipse at 15% 40%,rgba(122,31,31,.07) 0%,transparent 55%), radial-gradient(ellipse at 85% 40%,rgba(31,61,122,.07) 0%,transparent 55%); }

header { text-align:center; padding:1.5rem; border-bottom:1px solid rgba(201,168,76,.2); }
.school-name { font-family:'Cinzel Decorative',cursive; font-size:1.8rem; color:var(--gold-light); text-shadow: 0 0 10px rgba(201,168,76,0.3); }

.rubrique-bar { display:flex; background:rgba(5,4,2,.8); border-bottom:1px solid rgba(201,168,76,.15); overflow-x: auto; }
.rubrique-tab { padding:1rem 1.5rem; font-family:'Cinzel Decorative'; font-size:.6rem; color:var(--muted); cursor:pointer; text-transform:uppercase; white-space: nowrap; border-bottom: 2px solid transparent; transition: 0.3s; }
.rubrique-tab.active-matieres { color:var(--gold-light); border-bottom-color: var(--gold); }
.rubrique-tab.active-ferrox { color:#e87070; border-bottom-color: #7a1f1f; }
.rubrique-tab.active-academie { color:#70a0e8; border-bottom-color: #1f3d7a; }

.main-layout { display:flex; flex:1; width:100%; height:calc(100vh - 140px); }
nav { width:260px; min-width:260px; padding:1rem 0; border-right:1px solid rgba(201,168,76,.12); overflow-y:auto; background: rgba(10,8,4,0.4); }
.nav-item { padding:.8rem 1.2rem; cursor:pointer; font-size:0.95rem; color:var(--muted); border-left:3px solid transparent; transition: 0.2s; }
.nav-item:hover { color:var(--gold-light); background: rgba(201,168,76,0.05); }
.nav-item.active { color:var(--gold-light); background:rgba(201,168,76,0.1); border-left-color:var(--gold); }

.content-area { flex:1; padding:2rem; overflow-y: auto; }

.course-header-flex { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
.delete-page-icon { color: var(--blood); cursor: pointer; font-family: 'Cinzel Decorative'; font-size: 0.7rem; letter-spacing: 1px; border: 1px solid var(--blood); padding: 5px 10px; border-radius: 3px; transition: 0.3s; }
.delete-page-icon:hover { background: var(--blood); color: white; }

.page-title-display { font-family: 'Cinzel Decorative'; color: var(--gold-light); font-size: 1.5rem; margin-bottom: 1rem; border-bottom: 1px solid rgba(201,168,76,0.2); padding-bottom: 5px; }

.course-editor { 
  width:50%; min-height:400px; background:rgba(10,8,4,0.6); 
  border:1px solid rgba(201,168,76,0.3); padding:1.5rem; 
  color:var(--parchment); font-family:inherit; font-size:1.1rem; 
  outline:none; line-height: 1.6; border-radius: 4px;
}
.course-editor img { max-width: 90%; height: auto; display: block; margin: 1rem auto; border: 1px solid var(--gold-dark); border-radius: 3px; }

.page-manager { display: flex; gap: 8px; margin-bottom: 1.5rem; flex-wrap: wrap; align-items: center; }
.page-tab { padding: 6px 14px; background: rgba(201, 168, 76, 0.05); border: 1px solid rgba(201, 168, 76, 0.2); color: var(--muted); cursor: pointer; font-size: 0.8rem; border-radius: 3px; max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.page-tab.active { background: rgba(201, 168, 76, 0.2); color: var(--gold-light); border-color: var(--gold); }

.save-btn { width: 100%; background: linear-gradient(to bottom, var(--gold), var(--gold-dark)); color: #000; border: none; padding: 1.2rem; font-family: 'Cinzel Decorative'; font-weight: bold; cursor: pointer; margin-top: 15px; text-transform: uppercase; border-radius: 3px; letter-spacing: 1px; }

#sync-dot { position:fixed; top:1rem; right:1rem; width:10px; height:10px; border-radius:50%; background:#7a1f1f; z-index: 10000; }
#sync-dot.ok { background:#50c878; box-shadow: 0 0 10px #50c878; }
</style>
</head>
<body>
<div class="bg-ambiance"></div>
<div id="sync-dot"></div>

<div class="site-wrapper">
  <header><div class="school-name">École des Arts Arcanes</div></header>
  <div class="rubrique-bar">
    <div class="rubrique-tab active-matieres" id="tab-matieres" onclick="switchRubrique('matieres')">📚 Matières</div>
    <div class="rubrique-tab" id="tab-ferrox" onclick="switchRubrique('ferrox')">🩸 Ferrox</div>
    <div class="rubrique-tab" id="tab-academie" onclick="switchRubrique('academie')">🏛️ Académie</div>
  </div>
  <div class="main-layout">
    <nav id="side-nav"><div id="nav-items-container"></div></nav>
    <div class="content-area" id="main-content">
        <div style="text-align: center; margin-top: 5rem; opacity: 0.3;"><p>✦ Sélectionnez un chapitre pour commencer ✦</p></div>
    </div>
  </div>
</div>

<script>
const SB_URL = "https://eoglrxmqyrfxilnxbewx.supabase.co";
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVvZ2xyeG1xeXJmeGlsbnhiZXd4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0MjQxMDgsImV4cCI6MjA5MzAwMDEwOH0.PLxoyreQnp2_phV_y9lCx4RE_Tc4X0CrLyudR-VFXJI";

const DATA = {
    matieres: [{id:'sort',label:'⚡ Sortilèges'}, {id:'pot',label:'⚗️ Potions'}, {id:'bot',label:'🌿 Botanique'}, {id:'disc',label:'📜 Discipline'}, {id:'culi',label:'🍵 Survie'}, {id:'dcfo',label:'🛡️ DCFO'}, {id:'hist',label:'📖 Histoire'}, {id:'vol',label:'🧹 Vol'}, {id:'crea',label:'🐉 Créatures'}, {id:'divi',label:'🔮 Divination'}],
    ferrox: [{id:'f_h',label:'📜 Histoire Ferrox'}, {id:'f_r',label:'🩸 Rituels & Sang'}, {id:'f_a',label:'⚔️ Armes & Combat'}, {id:'f_al',label:'🔥 Alchimie Sombre'}, {id:'f_c',label:'🦅 Codes & Lois'}, {id:'f_m',label:'🩻 Hiérarchie'}, {id:'f_ca',label:'🗺️ Cartographie'}, {id:'f_d',label:'📁 Divers'}],
    academie: [{id:'a_r',label:'📋 Règles & Statuts'}, {id:'a_c',label:'🎓 Programmes'}, {id:'a_e',label:'✏️ Examens'}, {id:'a_p',label:'👤 Professeurs'}, {id:'a_ev',label:'🌟 Événements'}, {id:'a_ca',label:'🗺️ Cartographie'}, {id:'a_ar',label:'🗄️ Archives'}, {id:'a_d',label:'📁 Divers'}]
};

let sb = supabase.createClient(SB_URL, SB_KEY);
let allCourseData = {}; 
let currentCourseId = null, currentPageId = null, currentRubrique = 'matieres';

async function loadAll() {
  const { data } = await sb.from('notes').select('*');
  data?.forEach(n => {
    const baseId = n.id.split('_p')[0];
    if(!allCourseData[baseId]) allCourseData[baseId] = [];
    allCourseData[baseId].push({id: n.id, content: n.content, title: n.title || "Page " + (allCourseData[baseId].length + 1)});
  });
  switchRubrique('matieres');
  document.getElementById('sync-dot').classList.add('ok');
}

function switchRubrique(rub) {
    currentRubrique = rub;
    document.querySelectorAll('.rubrique-tab').forEach(t => t.classList.remove('active-matieres', 'active-ferrox', 'active-academie'));
    document.getElementById('tab-' + rub).classList.add('active-' + rub);
    const container = document.getElementById('nav-items-container');
    container.innerHTML = DATA[rub].map(c => `<div class="nav-item" id="nav-${c.id}" onclick="selectCourse('${c.id}', '${c.label}')">${c.label}</div>`).join('');
}

function selectCourse(id, label) {
    currentCourseId = id;
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    if(document.getElementById('nav-' + id)) document.getElementById('nav-' + id).classList.add('active');
    if(!allCourseData[id]) allCourseData[id] = [{id: id + '_p1', content: '', title: 'Introduction'}];
    currentPageId = allCourseData[id][0].id;
    renderEditor(label);
}

function renderEditor(label) {
    const main = document.getElementById('main-content');
    const pages = allCourseData[currentCourseId];
    const activePage = pages.find(p => p.id === currentPageId) || pages[0];

    main.innerHTML = `
        <div class="course-header-flex">
            <h2 style="font-family:Cinzel Decorative; color:var(--gold-dark); font-size:0.9rem;">${label}</h2>
            <div class="delete-page-icon" onclick="deleteCurrentPage()">Déchirer la page</div>
        </div>
        
        <div class="page-manager">
            ${pages.map((p, i) => `<div class="page-tab ${currentPageId === p.id ? 'active' : ''}" onclick="switchPage('${p.id}')">${p.title}</div>`).join('')}
            <button class="page-tab" style="border:1px dashed var(--gold); color:var(--gold)" onclick="addPage()">+ Nouvelle Page</button>
        </div>

        <div class="page-title-display">${activePage.title}</div>
        
        <div class="course-editor" id="editor" contenteditable="true" placeholder="Écrivez votre grimoire ici...">${activePage.content}</div>
        
        <button class="save-btn" onclick="save()">✦ Consigner dans le Grimoire</button>
    `;
    const ed = document.getElementById('editor');
    ed.addEventListener('paste', handlePaste);
    ed.addEventListener('dragover', (e) => e.preventDefault());
    ed.addEventListener('drop', handleDrop);
}

function handlePaste(e) {
    const items = (e.clipboardData || e.originalEvent.clipboardData).items;
    for (let item of items) { if (item.type.indexOf("image") !== -1) { e.preventDefault(); insertImageAtCursor(item.getAsFile()); } }
}

function handleDrop(e) {
    e.preventDefault();
    if (document.caretRangeFromPoint) {
        let range = document.caretRangeFromPoint(e.clientX, e.clientY);
        let sel = window.getSelection();
        sel.removeAllRanges(); sel.addRange(range);
    }
    for (let file of e.dataTransfer.files) { if (file.type.startsWith('image/')) insertImageAtCursor(file); }
}

function insertImageAtCursor(file) {
    const reader = new FileReader();
    reader.onload = (e) => { 
        const img = document.createElement("img"); img.src = e.target.result;
        const sel = window.getSelection();
        if (sel.rangeCount) {
            const range = sel.getRangeAt(0); range.deleteContents(); range.insertNode(img);
            range.setStartAfter(img); range.collapse(true); sel.removeAllRanges(); sel.addRange(range);
        } else { document.getElementById('editor').appendChild(img); }
    };
    reader.readAsDataURL(file);
}

function switchPage(pid) { 
    currentPageId = pid; 
    renderEditor(DATA[currentRubrique].find(c => c.id === currentCourseId).label); 
}

// --- NOUVELLE FONCTION AVEC TITRE À LA CRÉATION ---
function addPage() {
    let newTitle = prompt("Quel est le nom de cette nouvelle page ?", "Nouveau Chapitre");
    
    if (newTitle === null) return; // Annule si on clique sur annuler
    if (newTitle.trim() === "") newTitle = "Page sans titre";

    const newId = currentCourseId + '_p' + Date.now();
    allCourseData[currentCourseId].push({id: newId, content: '', title: newTitle});
    currentPageId = newId;
    renderEditor(DATA[currentRubrique].find(c => c.id === currentCourseId).label);
}

async function deleteCurrentPage() {
    if (!confirm("Voulez-vous vraiment détruire cette page ?")) return;
    await sb.from('notes').delete().eq('id', currentPageId);
    allCourseData[currentCourseId] = allCourseData[currentCourseId].filter(p => p.id !== currentPageId);
    if (allCourseData[currentCourseId].length === 0) allCourseData[currentCourseId] = [{id: currentCourseId + '_p1', content: '', title: 'Introduction'}];
    currentPageId = allCourseData[currentCourseId][0].id;
    renderEditor(DATA[currentRubrique].find(c => c.id === currentCourseId).label);
}

async function save() {
    const content = document.getElementById('editor').innerHTML;
    const p = allCourseData[currentCourseId].find(p => p.id === currentPageId);
    
    const { error } = await sb.from('notes').upsert({
        id: currentPageId, 
        content: content, 
        title: p.title 
    });

    if(!error) {
        p.content = content;
        alert("Savoir consigné ✓");
    } else {
        alert("Erreur de magie : " + error.message);
    }
}

loadAll();
</script>
</body>
</html>
