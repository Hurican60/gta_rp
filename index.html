<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>École des Arts Arcanes — Grimoire RP</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* --- STYLES --- */
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --gold: #c9a84c; --gold-light: #e8c97a; --gold-dark: #8a6a1f;
  --parchment: #f0e6cc; --muted: #7a6a4f; --deep: #0a0804;
}
body { background:#0a0804; font-family:'IM Fell English',serif; color:var(--parchment); min-height:100vh; overflow-x:hidden; }
.bg-ambiance { position:fixed; inset:0; pointer-events:none; z-index:0; background: radial-gradient(ellipse at 15% 40%,rgba(122,31,31,.07) 0%,transparent 55%), radial-gradient(ellipse at 85% 40%,rgba(31,61,122,.07) 0%,transparent 55%); }

header { text-align:center; padding:1.5rem; border-bottom:1px solid rgba(201,168,76,.2); }
.school-name { font-family:'Cinzel Decorative',cursive; font-size:1.8rem; color:var(--gold-light); }

.rubrique-bar { display:flex; background:rgba(5,4,2,.8); border-bottom:1px solid rgba(201,168,76,.15); overflow-x: auto; }
.rubrique-tab { padding:1rem 1.5rem; font-family:'Cinzel Decorative'; font-size:.65rem; color:var(--muted); cursor:pointer; text-transform:uppercase; white-space: nowrap; border-bottom: 2px solid transparent; }
.rubrique-tab.active-matieres { color:var(--gold-light); border-bottom-color: var(--gold); }
.rubrique-tab.active-ferrox { color:#e87070; border-bottom-color: #7a1f1f; }
.rubrique-tab.active-academie { color:#70a0e8; border-bottom-color: #1f3d7a; }

.main-layout { display:flex; flex:1; width:100%; }
.rubrique-panel { display:none; flex:1; width: 100%; }
.rubrique-panel.active { display:flex; }

nav { width:240px; padding:1rem 0; border-right:1px solid rgba(201,168,76,.12); height:calc(100vh - 140px); overflow-y:auto; }
.nav-item { padding:.8rem 1.2rem; cursor:pointer; font-size:0.9rem; color:var(--muted); border-left:3px solid transparent; transition: 0.2s; }
.nav-item.active { color:var(--gold-light); background:rgba(201,168,76,0.1); border-left-color:var(--gold); }

.content-area { flex:1; padding:1.5rem 2rem; overflow-y: auto; height:calc(100vh - 140px); }
.course-panel { display:none; }
.course-panel.active { display:block; }

/* PAGES */
.page-manager { display: flex; gap: 8px; margin-bottom: 1rem; flex-wrap: wrap; }
.page-tab { padding: 4px 12px; background: rgba(201, 168, 76, 0.05); border: 1px solid rgba(201, 168, 76, 0.2); color: var(--muted); cursor: pointer; font-size: 0.75rem; }
.page-tab.active { background: rgba(201, 168, 76, 0.2); color: var(--gold-light); border-color: var(--gold); }

/* EDITOR */
.course-editor { width:100%; min-height:250px; background:rgba(10,8,4,0.8); border:1px solid rgba(201,168,76,0.3); padding:1rem; color:var(--parchment); font-family:inherit; font-size:1rem; outline:none; resize:vertical; }
.save-btn { background: linear-gradient(to bottom, var(--gold), var(--gold-dark)); color: #000; border: none; padding: 0.8rem; font-family: 'Cinzel Decorative'; font-weight: bold; cursor: pointer; margin-top: 10px; width: 100%; text-transform: uppercase; border-radius: 2px; }

/* PREVIEW FIGÉE */
.preview-title { margin-top: 2.5rem; font-family: 'Cinzel Decorative'; font-size: 0.7rem; color: var(--gold); border-bottom: 1px solid rgba(201,168,76,0.2); padding-bottom: 0.5rem; }
.course-preview { background: rgba(255,255,255,0.02); padding: 1.5rem; border-radius: 4px; min-height: 80px; white-space: pre-wrap; color:#e0d5ba; border: 1px solid rgba(201, 168, 76, 0.1); margin-top: 1rem; transition: background 0.5s; }
.preview-h1 { color: var(--gold-light); font-family: 'Cinzel Decorative'; font-size: 1.3rem; display: block; margin-top: 1rem; border-bottom: 1px solid rgba(201,168,76,0.2); }
.save-flash { background: rgba(201, 168, 76, 0.15) !important; }

/* IMAGES & DND */
.image-upload-zone { border: 2px dashed rgba(201, 168, 76, 0.2); padding: 1.5rem; text-align: center; cursor: pointer; color: var(--gold-light); margin-top: 2rem; font-size: 0.8rem; }
.image-upload-zone.dragover { background: rgba(201, 168, 76, 0.1); border-color: var(--gold); }
.image-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; margin-top: 1rem; }
.img-wrap { position: relative; border: 1px solid rgba(201, 168, 76, 0.2); aspect-ratio: 4/3; }
.img-wrap img { width: 100%; height: 100%; object-fit: cover; }
.img-del { position: absolute; top: 2px; right: 2px; background: #7a1f1f; color: white; border: none; padding: 2px 5px; cursor: pointer; font-size: 9px; }

#sync-dot { position:fixed; top:1rem; right:1rem; width:10px; height:10px; border-radius:50%; background:#7a1f1f; z-index: 10000; }
#sync-dot.ok { background:#50c878; box-shadow: 0 0 10px #50c878; }
</style>
</head>
<body>
<div class="bg-ambiance"></div>
<div id="sync-dot"></div>

<div class="site-wrapper">
  <header><div class="school-name">École des Arts Arcanes</div></header>

  <div class="rubrique-bar">
    <div class="rubrique-tab active-matieres" id="tab-matieres" onclick="switchRubrique('matieres')">📚 Matières</div>
    <div class="rubrique-tab" id="tab-ferrox" onclick="switchRubrique('ferrox')">🩸 Ferrox</div>
    <div class="rubrique-tab" id="tab-academie" onclick="switchRubrique('academie')">🏛️ Académie</div>
  </div>

  <div id="rubrique-matieres" class="rubrique-panel active"><div class="main-layout"><nav id="nav-matieres"></nav><div class="content-area" id="content-matieres"></div></div></div>
  <div id="rubrique-ferrox" class="rubrique-panel"><div class="main-layout"><nav id="nav-ferrox"></nav><div class="content-area" id="content-ferrox"></div></div></div>
  <div id="rubrique-academie" class="rubrique-panel"><div class="main-layout"><nav id="nav-academie"></nav><div class="content-area" id="content-academie"></div></div></div>
</div>

<script>
// --- CONFIGURATION ---
const SB_URL = "https://eoglrxmqyrfxilnxbewx.supabase.co";
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVvZ2xyeG1xeXJmeGlsbnhiZXd4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0MjQxMDgsImV4cCI6MjA5MzAwMDEwOH0.PLxoyreQnp2_phV_y9lCx4RE_Tc4X0CrLyudR-VFXJI";

const MATIERES = [{id:'sort',label:'⚡ Sortilèges'}, {id:'pot',label:'⚗️ Potions'}, {id:'bot',label:'🌿 Botanique'}, {id:'disc',label:'📜 Discipline'}, {id:'culi',label:'🍵 Survie'}, {id:'dcfo',label:'🛡️ DCFO'}, {id:'hist',label:'📖 Histoire'}, {id:'vol',label:'🧹 Vol'}, {id:'crea',label:'🐉 Créatures'}, {id:'divi',label:'🔮 Divination'}];
const FERROX = [{id:'f_h',label:'📜 Histoire'}, {id:'f_r',label:'🩸 Rituels'}, {id:'f_a',label:'⚔️ Armes'}, {id:'f_al',label:'🔥 Alchimie'}, {id:'f_c',label:'🦅 Codes'}, {id:'f_m',label:'🩻 Hiérarchie'}, {id:'f_ca',label:'🗺️ Cartographie'}, {id:'f_d',label:'📁 Divers'}];
const ACAD = [{id:'a_r',label:'📋 Règles'}, {id:'a_c',label:'🎓 Programmes'}, {id:'a_e',label:'✏️ Examens'}, {id:'a_p',label:'👤 Profs'}, {id:'a_ev',label:'🌟 Events'}, {id:'a_ca',label:'🗺️ Cartographie'}, {id:'a_ar',label:'🗄️ Archives'}, {id:'a_d',label:'📁 Divers'}];

let sb = supabase.createClient(SB_URL, SB_KEY);
let allCourseData = {}; 
let currentPages = {};
let imageStore = {};

// --- CHARGEMENT ---
async function loadData() {
  const {data: notes} = await sb.from('notes').select('*');
  const {data: imgs} = await sb.from('images').select('*');

  notes?.forEach(n => {
    const baseId = n.id.split('_p')[0];
    if(!allCourseData[baseId]) allCourseData[baseId] = [];
    allCourseData[baseId].push({id: n.id, content: n.content});
  });

  imgs?.forEach(img => {
    if(!imageStore[img.course_id]) imageStore[img.course_id] = [];
    imageStore[img.course_id].push({id: img.id, src: img.src});
  });

  [...MATIERES, ...FERROX, ...ACAD].forEach(c => {
    if(!allCourseData[c.id]) allCourseData[c.id] = [{id: c.id + '_p1', content: ''}];
    renderPageSystem(c.id);
    renderGrid(c.id);
  });
  document.getElementById('sync-dot').classList.add('ok');
}

// --- LOGIQUE PAGES & PREVIEW FIGÉE ---
function renderPageSystem(courseId) {
  const pages = allCourseData[courseId] || [{id: courseId + '_p1', content: ''}];
  if(!currentPages[courseId]) currentPages[courseId] = pages[0].id;

  const manager = document.getElementById('pages-' + courseId);
  if(!manager) return;

  manager.innerHTML = pages.map((p, i) => `
    <div class="page-tab ${currentPages[courseId] === p.id ? 'active' : ''}" onclick="switchPage('${courseId}', '${p.id}')">
      P. ${i + 1} ${i > 0 ? `<span onclick="deletePage(event, '${courseId}', '${p.id}')" style="margin-left:5px;color:#ff4d4d">×</span>` : ''}
    </div>
  `).join('') + `<button onclick="addNewPage('${courseId}')" style="font-size:0.7rem;background:none;border:1px dashed var(--gold);color:var(--gold);cursor:pointer;padding:2px 5px;margin-left:5px">+ Page</button>`;

  const activePage = pages.find(p => p.id === currentPages[courseId]) || pages[0];
  document.getElementById('editor-' + courseId).value = activePage.content;
  
  // ICI : On affiche le contenu dans la preview au chargement pour voir ce qui est déjà enregistré
  renderPreview(courseId, activePage.content);
}

function renderPreview(id, content) {
  const prev = document.getElementById('prev-' + id);
  if(!prev) return;
  prev.innerHTML = content
    .replace(/^# (.*$)/gim, '<span class="preview-h1">$1</span>')
    .replace(/^• (.*$)/gim, '<div>• $1</div>') || '<p style="opacity:0.3">Rien d\'enregistré...</p>';
}

function addNewPage(courseId) {
  const newId = courseId + '_p' + Date.now();
  allCourseData[courseId].push({id: newId, content: ''});
  currentPages[courseId] = newId;
  renderPageSystem(courseId);
}

function switchPage(courseId, pageId) {
  currentPages[courseId] = pageId;
  renderPageSystem(courseId);
}

async function saveCourse(courseId) {
  const pageId = currentPages[courseId];
  const content = document.getElementById('editor-' + courseId).value;
  const prev = document.getElementById('prev-' + courseId);

  const { error } = await sb.from('notes').upsert({id: pageId, content: content});
  
  if(!error) {
    allCourseData[courseId].find(x => x.id === pageId).content = content;
    renderPreview(courseId, content); // On "fige" le texte dans la preview
    prev.classList.add('save-flash');
    setTimeout(() => prev.classList.remove('save-flash'), 600);
  } else { alert("Erreur : " + error.message); }
}

// --- IMAGES & DRAG AND DROP ---
async function uploadImage(courseId, file) {
  const reader = new FileReader();
  reader.onload = async (e) => {
    const b64 = e.target.result;
    const { data, error } = await sb.from('images').insert({ course_id: courseId, src: b64 }).select().single();
    if(!error && data) {
      if(!imageStore[courseId]) imageStore[courseId] = [];
      imageStore[courseId].push({id: data.id, src: b64});
      renderGrid(courseId);
    }
  };
  reader.readAsDataURL(file);
}

function handleDrop(e, id) {
  e.preventDefault();
  document.getElementById('dz-' + id).classList.remove('dragover');
  for(let f of e.dataTransfer.files) uploadImage(id, f);
}

function renderGrid(id) {
  const g = document.getElementById('grid-' + id);
  if(!g) return;
  g.innerHTML = (imageStore[id] || []).map((img, i) => `
    <div class="img-wrap"><img src="${img.src}"><button class="img-del" onclick="delImg('${id}', ${i})">×</button></div>
  `).join('');
}

async function delImg(courseId, i) {
  const img = imageStore[courseId][i];
  await sb.from('images').delete().eq('id', img.id);
  imageStore[courseId].splice(i, 1);
  renderGrid(courseId);
}

// --- NAVIGATION ---
function switchRubrique(n) {
  document.querySelectorAll('.rubrique-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.rubrique-tab').forEach(t => t.className = 'rubrique-tab');
  document.getElementById('rubrique-' + n).classList.add('active');
  document.getElementById('tab-' + n).classList.add('active-' + n);
}

function showCourse(id, el) {
  const panel = el.closest('.rubrique-panel');
  panel.querySelectorAll('.course-panel').forEach(p => p.classList.remove('active'));
  panel.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('panel-' + id).classList.add('active');
  el.classList.add('active');
}

// --- UI ---
function buildPanel(c) {
  return `
  <div id="panel-${c.id}" class="course-panel">
    <h2 style="font-family:Cinzel Decorative; color:var(--gold-light); margin-bottom:1rem; font-size:1.2rem">${c.label}</h2>
    <div class="page-manager" id="pages-${c.id}"></div>
    <textarea class="course-editor" id="editor-${c.id}" placeholder="Écrivez ici..."></textarea>
    <button class="save-btn" onclick="saveCourse('${c.id}')">✦ Enregistrer cette page</button>
    <div class="preview-title">📜 Version enregistrée du Grimoire</div>
    <div class="course-preview" id="prev-${c.id}"></div>
    <div class="image-upload-zone" id="dz-${c.id}" ondragover="event.preventDefault(); this.classList.add('dragover')" ondragleave="this.classList.remove('dragover')" ondrop="handleDrop(event, '${c.id}')" onclick="document.getElementById('f-${c.id}').click()">
      Glissez vos parchemins ici ou cliquez
    </div>
    <input type="file" id="f-${c.id}" hidden multiple onchange="for(let f of this.files) uploadImage('${c.id}', f)">
    <div class="image-grid" id="grid-${c.id}"></div>
  </div>`;
}

function buildAll() {
  const configs = [{c:MATIERES, r:'matieres'}, {c:FERROX, r:'ferrox'}, {c:ACAD, r:'academie'}];
  configs.forEach(conf => {
    const nav = document.getElementById('nav-' + conf.r), cont = document.getElementById('content-' + conf.r);
    conf.c.forEach((c, i) => {
      nav.innerHTML += `<div class="nav-item ${i === 0 ? 'active' : ''}" onclick="showCourse('${c.id}',this)">${c.label}</div>`;
      cont.innerHTML += buildPanel(c);
    });
    if(conf.c[0]) document.getElementById('panel-'+conf.c[0].id).classList.add('active');
  });
}

buildAll();
loadData();
</script>
</body>
</html>
